markdown: >-
  ## Overview


  The Art of Doing Science and Engineering is a book about thinking; more
  specifically, a style of thinking by which great ideas are conceived.
  Originally published in 1997, this book was republished by Stripe Press in
  2020 with enhanced graphics and a new foreword by designer and engineer Bret
  Victor.


  ## About Richard Hamming


  Richard Hamming is best known for discovering mathematical formulas that allow
  computers to correct their own errors, a fundamental function of modems,
  compact disks, and satellite communications. Throughout his career, Hamming
  received many awards for his work, including the Turing Award in 1968, the
  highest honor in computer science.


  ## Origin and Content


  The book comes from a course Hamming taught at the Naval Postgraduate School
  in Monterey, California. It elaborates on Hamming's seminal essay "You and
  Your Research," offering a manual for building something great.


  Interestingly, much of the book centers on predictions about "what will the
  world be like in 2020" - made from his 1990s lectures, providing fascinating
  historical perspective on technology forecasting.


  ## The 2020 Edition


  This edition includes:

  - The original 1996 compilation of Hamming's lectures

  - New foreword by designer and engineer Bret Victor

  - More than 70 redrawn graphs and charts

  - 432 pages of timeless wisdom


  ## Key Themes


  - How to think about and approach problems in science and engineering

  - The importance of learning to learn throughout your career

  - Developing intuition and creativity in technical fields

  - Understanding the nature of great work and how to pursue it

  - The relationship between style and substance in research


  ## Recognition


  Considered a classic in technical education and has been recommended by
  leading technologists and entrepreneurs for developing systematic thinking
  skills.


  ## Availability


  Published by Stripe Press on May 26, 2020. Available in hardcover through
  major retailers and as an ebook.
