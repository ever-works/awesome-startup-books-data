  # Founding Sales


  ## Overview

  Founding Sales by Peter Kazanjy demystifies the sales process for startup
  founders. It offers a detailed, tactical guide to founder-led sales, from
  pitching to closing deals and transitioning to a hired sales team.


  ## Features

  - Step-by-step sales process for founders

  - Sales pitch templates and scripts

  - Objection handling techniques

  - Follow-up and pipeline management strategies

  - Guidance on hiring and managing your first sales reps

  - Real-world examples and case studies


  ## Pricing

  Available in paperback, hardcover, Kindle, and audiobook. Prices typically
  range from $20 to $35.
