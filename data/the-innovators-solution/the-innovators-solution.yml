name: The Innovator’s Solution
description: Clayton Christensen’s follow-up to The Innovator’s Dilemma, this
  book presents well-researched strategies for creating sustained success
  through disruption. It explains how to innovate for disruption and protect
  your business from entrants, based on research across hundreds of companies.
