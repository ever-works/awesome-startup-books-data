markdown: >-
  ## Overview


  The Ride of a Lifetime is a memoir by Robert Iger about his 15-year tenure as
  CEO of The Walt Disney Company. Published in September 2019, it chronicles how
  Iger transformed Disney into the largest and most admired media company in the
  world.


  ## About Bob Iger


  Robert Alan Iger served as CEO of The Walt Disney Company from 2005 to 2020,
  and again from 2022 to 2026. He began his career at ABC in 1974 and worked his
  way up through the ranks before becoming Disney CEO.


  ## Key Accomplishments


  Under Iger's leadership:


  - Disney's market value grew nearly five times

  - Acquired Pixar (2006) for $7.4 billion

  - Acquired Marvel (2009) for $4 billion  

  - Acquired Lucasfilm (2012) for $4 billion

  - Acquired 21st Century Fox assets (2019) for $71 billion

  - Launched Disney+ streaming service


  ## Leadership Vision


  When Iger became CEO in 2005, he faced intense competition and rapid
  technological change. His vision came down to three clear ideas:


  1. **Recommit to Quality** - Focus on excellence in content and experiences

  2. **Embrace Technology** - Instead of fighting technological disruption, lean
  into it

  3. **Think Global** - Transform Disney into a stronger brand in international
  markets


  ## Ten Principles for Effective Leadership


  The book outlines Iger's leadership principles:


  - **Optimism** - The ability to see possibilities where others see roadblocks

  - **Courage** - Making difficult decisions and taking calculated risks

  - **Focus** - Prioritizing what matters most

  - **Decisiveness** - Not letting perfect be the enemy of good

  - **Curiosity** - Never stop learning and exploring new ideas

  - **Fairness** - Treating people with respect and empathy

  - **Thoughtfulness** - Taking time to consider consequences

  - **Authenticity** - Being genuine and true to your values

  - **The Relentless Pursuit of Perfection** - Striving for excellence without
  perfectionism

  - **Integrity** - Doing the right thing, even when it's hard


  ## Key Lessons


  ### On Acquisitions

  Iger provides detailed insights into negotiating and integrating major
  acquisitions, including the delicate process of acquiring Pixar and working
  with Steve Jobs.


  ### On Innovation

  The importance of embracing new technologies and business models rather than
  protecting legacy businesses.


  ### On Leadership During Crisis

  How to make difficult decisions under pressure and navigate corporate
  challenges.


  ## Humility and Empathy


  Iger consistently emphasizes that great companies are built by empowered
  people, and that humility and empathy are not soft skills but leadership
  essentials.


  ## Publication Details


  Published by Random House in 2019.
