name: "Build: An Unorthodox Guide to Making Things Worth Making"
description: A practical startup and product-building book by Tony Fadell that
  shares hard-won lessons from building world-changing products at Apple, Nest,
  and other ventures. It covers how to go from idea to product, lead teams,
  navigate investors, and make products that truly matter—highly relevant for
  startup founders learning to build and ship things people love.
