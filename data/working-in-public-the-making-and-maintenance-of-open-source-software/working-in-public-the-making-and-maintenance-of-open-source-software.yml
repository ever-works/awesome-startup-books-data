name: "Working in Public: The Making and Maintenance of Open Source Software"
description: An examination of modern open source software development by Nadia
  Eghbal that explores how the dynamics of open source have evolved over the
  past two decades. Drawing on hundreds of developer interviews and platform
  analyses, the book reveals insights applicable to all individual creators on
  the internet.
