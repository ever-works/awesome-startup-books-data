markdown: >-
  ## Overview


  Working in Public examines modern open source software development, its
  evolution over the last two decades, and its ramifications for an internet
  reorienting itself around individual creators. Published by Stripe Press, the
  book challenges common perceptions about how open source works today.


  ## Evolution of Open Source


  Open source software has long served as a bellwether for other online
  behavior. In the late 1990s, it provided an optimistic model for public
  collaboration. However, in the last 20 years, it has shifted dramatically
  toward solo operators who write and publish code that's consumed by millions.


  ## Key Insights


  The book argues that examining **who produces things on the internet**, and
  not just what they produce, helps us understand the value of online content
  today. This perspective applies far beyond software to all forms of digital
  creation.


  ## Research Foundation


  Nadia Eghbal draws on:

  - Hundreds of in-depth developer interviews

  - Analyses of platforms like GitHub, Twitter, Facebook, Instagram, Twitch, and
  YouTube

  - Years of research and work in the open source ecosystem

  - Firsthand experience at GitHub working to improve the developer experience


  ## About the Author


  Nadia Eghbal (also known as Nadia Asparouhova) is a writer and researcher who
  explores how the internet enables individual creators. From 2015 to 2019, she
  focused on the production of open source software, working independently and
  at GitHub to improve the open source developer experience.


  ## Why It Matters for Founders


  While focused on open source, the book offers critical insights for startup
  founders about:

  - Building and maintaining communities

  - Managing contributor dynamics

  - Understanding creator economics

  - Scaling individual efforts

  - Platform dynamics and their effects on creators


  ## Broader Applications


  The patterns identified in open source development apply to:

  - Content creation and the creator economy

  - Community-driven products

  - Platform businesses

  - Any internet-based collaborative work


  ## Key Themes


  - The shift from collaborative to individual creation

  - How platforms shape creative work

  - The economics of free labor and voluntary contribution

  - Sustainability challenges for popular projects

  - The relationship between creators and consumers


  ## Target Audience


  Essential reading for:

  - Software developers and open source maintainers

  - Startup founders building developer tools or platforms

  - Product managers working with developer communities

  - Anyone interested in the creator economy

  - Researchers studying online collaboration


  ## Availability


  Published by Stripe Press. Available in hardcover and ebook formats through
  major retailers. ISBN: 9780578675862.
