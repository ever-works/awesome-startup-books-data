name: "The Everything Store: Jeff Bezos and the Age of Amazon"
description: "Brad Stone chronicles Bezos' vision turning Amazon from bookseller
  to empire via customer obsession, infrastructure bets, and self-disruption
  like AWS. Key founder takeaways: prioritize long-term value, embrace losses
  for scale, and build moats through ops excellence to dodge short-term profit
  traps. Vs Phil Knight's Shoe Dog, it spotlights e-commerce logistics over
  branding; vital for endurance in marketplace building."
source_url: https://www.goodreads.com/book/show/16085108-the-everything-store
category: Biographies
