markdown: >-
  ## Overview


  Value Proposition Design helps create products and services customers actually
  want with a systematic approach to designing, testing, and refining value
  propositions.


  ## The Value Proposition Canvas


  Two-sided tool connecting:


  **Customer Profile**:

  - Customer Jobs

  - Pains

  - Gains


  **Value Map**:

  - Products & Services

  - Pain Relievers

  - Gain Creators


  ## Testing Value Propositions


  - Design hypotheses

  - Run experiments

  - Learn and iterate


  ## Pricing


  Available for approximately $25-40.
