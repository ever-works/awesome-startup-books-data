name: "Amp It Up: Leading for Hypergrowth by Raising Expectations, Increasing
  Urgency, and Elevating Intensity"
description: Frank Slootman outlines aggressive growth tactics for founders,
  focusing on raising performance standards, accelerating pace, and elevating
  execution intensity to scale teams and revenue rapidly. Key use cases include
  talent upgrades for higher density and cycle time reductions, as seen in
  Snowflake's path to the largest software IPO. Compared to Blitzscaling, it
  prioritizes cultural rigor over mere speed.
