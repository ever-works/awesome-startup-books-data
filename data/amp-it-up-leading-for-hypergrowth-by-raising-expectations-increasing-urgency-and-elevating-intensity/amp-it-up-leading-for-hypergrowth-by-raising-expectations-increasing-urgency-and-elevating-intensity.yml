markdown: >-
  ## Overview


  Frank Slootman led three companies (Data Domain, ServiceNow, and Snowflake) to
  massive success, including the largest software IPO in history. In Amp It Up,
  he shares his no-nonsense philosophy: most leaders have significant room to
  improve performance without expensive changes to talent or structure. What
  they need is to raise expectations, increase urgency, and elevate intensity.


  ## The Core Philosophy


  **Amp It Up** means:

  - Raise your standards

  - Increase the pace

  - Sharpen your focus

  - Align around what truly matters

  - Execute with intensity every single day


  This isn't about working longer hours—it's about dramatically increasing the
  quality and speed of execution.


  ## The Five Core Principles


  ### 1. Raise Your Standards


  **Mediocrity is a choice.**


  - Excellent performers want to work with other excellent performers

  - Tolering B players drives away A players

  - Be direct about performance gaps

  - Don't wait—address issues immediately

  - Upgrade talent continuously


  **Key insight**: The best employees will leave if you tolerate mediocrity.


  ### 2. Align Your People


  **Everyone must understand the priorities.**


  - Repeat the mission obsessively

  - Ensure every team knows how they contribute

  - Cut anything that doesn't serve the main objectives

  - Say no to almost everything

  - Eliminate competing priorities


  **Key insight**: Misalignment is more expensive than moving slowly.


  ### 3. Pick Up the Pace


  **Urgency must be cultural, not situational.**


  - Fast decisions compound

  - Meetings should end with clear next steps and owners

  - Shorten every cycle time

  - Don't wait for perfect information

  - Bias toward action


  **Key insight**: Speed is a competitive advantage that's hard to copy.


  ### 4. Transform Your Strategy


  **Good strategy is about choices.**


  - What will you NOT do?

  - Focus creates power

  - Go where the puck is going, not where it is

  - Timing matters enormously

  - Position for where the market will be in 3-5 years


  **Key insight**: Strategy is useless without exceptional execution.


  ### 5. Transform Your Culture


  **Culture eats strategy for breakfast.**


  - Model the behavior you expect

  - Celebrate intensity and results

  - Make it safe to disagree but unsafe to not commit

  - Fire brilliant jerks (culture killers)

  - Hire for alignment with culture


  **Key insight**: Culture determines what happens when you're not in the room.


  ## On Leadership


  **Leaders must:**

  - Set the standard personally

  - Be brutally honest

  - Make hard decisions quickly

  - Never accept excuses

  - Drive accountability relentlessly

  - Protect the culture obsessively


  **What leaders get wrong:**

  - Being liked over being respected

  - Avoiding difficult conversations

  - Optimizing for short-term harmony

  - Tolerating non-performance

  - Failing to communicate priorities clearly


  ## On Talent


  **The A Player Imperative**


  - Hire for trajectory, not just current skill

  - Look for people who've leveled up before

  - Intensity matters more than pedigree

  - Upgrade constantly

  - Be willing to make mistakes to get A players


  **Key quote**: "We don't have to outwork the competition; we have to outthink
  and outexecute them."


  ## On Meetings


  **Make meetings productive:**

  - Every meeting needs a clear owner and outcome

  - Start on time, end on time

  - No laptops or phones (be present)

  - Decisions must have owners and dates

  - Follow up ruthlessly

  - Cancel unnecessary meetings


  ## On Focus


  **What gets measured gets done:**


  - Define 3-5 key metrics

  - Review them weekly

  - Hold people accountable

  - Make data visible to everyone

  - Don't let dashboards get cluttered


  **The power of saying no:**

  - Most ideas are distractions

  - Every yes is a no to something else

  - Protect your team's focus

  - Kill projects that don't serve priorities


  ## What Founders Will Learn


  - How to dramatically improve performance with existing team

  - Creating a culture of urgency and excellence

  - When to upgrade talent vs. develop existing team

  - Making decisions faster without sacrificing quality

  - Aligning everyone around what truly matters

  - Leading through hypergrowth without chaos

  - The difference between being busy and being effective


  ## Slootman's Track Record


  **Data Domain:**

  - CEO 2003-2009

  - Grew to $1B+ revenue

  - Sold to EMC for $2.4B


  **ServiceNow:**

  - CEO 2011-2017

  - Took public in 2012

  - Grew from $100M to $1.4B revenue

  - Market cap grew 5x


  **Snowflake:**

  - CEO 2019-present

  - Largest software IPO ever ($33B valuation)

  - Fastest SaaS company to $1B ARR

  - Market cap peaked above $120B


  ## The Contrarian Elements


  **Slootman challenges conventional wisdom:**


  - Work-life balance is overemphasized (in hypergrowth)

  - Being nice is overrated (be direct instead)

  - Consensus is slow (decide and commit)

  - Remote work reduces intensity (he's skeptical)

  - Unlimited vacation leads to less accountability


  **Note**: These are deliberate choices for hypergrowth companies, not
  universal truths.


  ## Who This Book Is For


  **Perfect for:**

  - Founders scaling from $10M to $100M+

  - CEOs who feel their company could move faster

  - Leaders comfortable with high expectations

  - Anyone committed to excellence over comfort


  **Not for:**

  - Early-stage startups still finding PMF

  - Leaders prioritizing work-life balance

  - Those uncomfortable with direct feedback

  - Companies focused on steady, sustainable growth


  ## Style


  Slootman is direct, sometimes blunt. He doesn't sugarcoat. He believes in high
  standards, fast execution, and no excuses. The book reads like he talks:
  straight to the point.


  ## Key Quotes


  - "Raise your standards. Pick up the pace. Sharpen the focus. Upgrade your
  talent."

  - "Scaling is hard. Growing fast is harder. Most companies aren't even close
  to their potential."

  - "Culture doesn't just matter. It's the only thing that matters at scale."

  - "Intensity is not about hours worked. It's about the rate of progress per
  unit time."


