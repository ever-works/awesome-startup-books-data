markdown: >-
  ## Overview


  Four Thousand Weeks challenges conventional productivity advice by embracing
  life's limitations and finitude.


  ## Core Philosophy


  The average human lifespan is about 4,000 weeks. Rather than trying to do
  everything, accept limitations and focus on what truly matters.


  ## Key Insights


  - You'll never get everything done

  - FOMO is inevitable - embrace it

  - Efficiency traps create more work

  - Pay yourself first (with time)

  - Accept imperfection


  ## For Entrepreneurs


  Helps founders make peace with limited time and focus on highest-impact
  activities.


  ## Pricing


  Available for approximately $16-27.
