markdown: >-
  ## Overview


  Multipliers: How the Best Leaders Make Everyone Smarter is a New York Times
  bestseller by Liz Wiseman that explores how certain leaders amplify the
  intelligence and capabilities of those around them, while others drain
  intelligence and energy from their teams.


  ## About the Author


  Liz Wiseman is a researcher, executive advisor, and the CEO of the Wiseman
  Group, a leadership research and development firm headquartered in Silicon
  Valley. She teaches leadership at Stanford University and has worked with
  leaders from Apple, Google, Nike, and many other leading organizations.


  ## Core Concept: Multipliers vs. Diminishers


  **Multipliers** are leaders who:

  - Amplify the intelligence and capability of people around them

  - Get more than 100% from their teams

  - Create organizations that can solve hard problems

  - Make people smarter and more capable


  **Diminishers** are leaders who:

  - Need to be the smartest person in the room

  - Drain intelligence and energy from teams

  - Underutilize their people's talents

  - Create dependency on themselves


  ## The Five Disciplines of Multipliers


  1. **The Talent Magnet**: Attract and optimize talent
     - Find people's native genius
     - Remove blockers to full contribution
     - Let talent flow across the organization

  2. **The Liberator**: Create an intense environment that demands best thinking
     - Create space for people to think
     - Demand best work
     - Generate rapid learning cycles

  3. **The Challenger**: Define opportunities that challenge people to go beyond
  what they know
     - Seed opportunities
     - Lay down challenges
     - Generate belief in what is possible

  4. **The Debate Maker**: Drive sound decisions through rigorous debate
     - Frame the issue
     - Spark the debate
     - Drive sound decisions

  5. **The Investor**: Give people ownership and invest in their success
     - Define ownership
     - Invest resources
     - Hold people accountable

  ## Research Foundation


  Wiseman analyzed data from more than 150 leaders across four continents and
  multiple industries. The research showed that Multipliers get almost twice as
  much capability from their people as Diminishers.


  ## Why Diminishers Exist


  Many Diminishers have good intentions but:

  - Grew up in command-and-control environments

  - Believe their job is to have all the answers

  - Want to protect their team from mistakes

  - Are simply unaware of their impact


  ## Becoming a Multiplier


  The book provides practical strategies:

  - Ask questions instead of giving answers

  - Give 51% of the vote to let others lead

  - Create "learning loops" from mistakes

  - Acknowledge what you don't know

  - Debate ideas rigorously before deciding


  ## Impact on Organizations


  Multipliers create:

  - Higher employee engagement

  - Better retention of top talent

  - Faster innovation

  - More resilient organizations

  - Distributed leadership capacity


  ## Why It Matters for Founders


  Startup founders often fall into Diminisher traps—being the smartest person in
  the room, making all decisions, and creating dependency. This book shows how
  to scale yourself by multiplying the intelligence of your team, essential for
  growing a startup.


  ## Updated Edition


  The revised and updated edition includes new research on accidental
  Diminishers, updated case studies, and expanded practical tools.


  ## Pricing


  Available in hardcover, paperback, ebook, and audiobook formats at standard
  retail prices.
