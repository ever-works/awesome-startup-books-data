markdown: >-
  ## Overview


  Cal Newport's contrarian thesis: "Follow your passion" is terrible advice.
  Instead, passion comes after you put in the hard work to become excellent at
  something valuable. The title comes from Steve Martin's advice for aspiring
  entertainers: "Be so good they can't ignore you."


  ## The Core Argument


  **The Passion Hypothesis is Wrong**


  Most career advice says follow your passion. But:

  - Pre-existing passions are rare

  - Passion takes time to develop

  - Passion follows competence, not the other way around


  Instead, focus on building rare and valuable skills ("career capital"), which
  you can then invest in the things you care about.


  ## The Four Rules


  ### Rule #1: Don't Follow Your Passion

  - Passion is a side effect of mastery

  - The passion hypothesis is dangerous and misleading

  - Most successful people didn't follow pre-existing passions


  ### Rule #2: Be So Good They Can't Ignore You (The Craftsman Mindset)

  - Focus on what you can offer the world, not what it can offer you

  - Build rare and valuable skills ("career capital")

  - Adopt the craftsman mindset over the passion mindset

  - **Deliberate practice** is how you build skills


  ### Rule #3: Turn Down a Promotion (The Importance of Control)

  - Control over your work is one of the most valuable traits

  - But control requires career capital to acquire

  - Avoid the control traps: seeking control without capital, or being offered
  control to keep you from leaving


  ### Rule #4: Think Small, Act Big (The Importance of Mission)

  - Missions provide meaning, but they come after building career capital

  - Missions exist at the "adjacent possible" of your field

  - Use "little bets" to explore mission ideas

  - Deploy the law of remarkability: remarkable projects in remarkable venues


  ## Key Concepts


  **Career Capital**: Rare and valuable skills that you can use to negotiate the
  job you want


  **Craftsman Mindset**: Focus on what value you're producing, not whether you
  "love" what you do


  **Deliberate Practice**: Focused practice that pushes you just beyond your
  comfort zone


  **The Adjacent Possible**: The next logical step only visible from the cutting
  edge of your field


  **Little Bets**: Small projects that explore different mission directions


  ## What Founders Will Learn


  - Why building skills matters more than finding your passion

  - How to know when you're ready to start a company (you need career capital
  first)

  - The importance of getting so good at something that people pay attention

  - Why control matters and when you've earned the right to seek it

  - How to find a meaningful mission (hint: not from soul-searching)

  - The role of deliberate practice in startup success


  ## For Startup Founders


  This book is crucial because:

  - It explains why some founders succeed and others fail (skills matter)

  - It shows why pivoting to your "passion" often doesn't work

  - It provides a framework for building expertise before raising money

  - It explains why missions emerge from competence, not introspection

  - It shows how to think about your career strategically


  ## Case Studies


  - **Steve Martin**: Became successful by getting really good at comedy, not by
  following passion

  - **Pardis Sabeti**: Found her mission only after building deep skills in
  computational biology

  - **Mike Jackson**: Built a meaningful career through skill development, not
  passion pursuit

  - **Alex Berger**: Used career capital to gain control over his schedule


  ## The Anti-Passion Message


  This isn't anti-passion. It's about the *order of operations*:

  1. Build rare and valuable skills

  2. Use those skills to gain control and pursue a mission

  3. Passion follows as a side effect


  Versus:

  1. Find your passion

  2. Hope everything works out


  ## About the Author


  Cal Newport is a computer science professor at Georgetown University and
  bestselling author of seven books including Deep Work and Digital Minimalism.
  He writes about performing valuable work in an increasingly distracted world.


  ## Pricing


  Published by Grand Central Publishing (Hachette Book Group) in 2012. ISBN:
  978-1455509126. 304 pages. Available in hardcover, paperback, ebook, and
  audiobook formats.
