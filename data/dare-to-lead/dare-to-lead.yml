name: Dare to Lead
description: Dare to Lead delivers leadership lessons for founders on embracing
  vulnerability to build trust, courage, and resilient teams during team
  building and crises. Key principles include rumbling with vulnerability,
  living values, and learning to rise for authentic leadership. Vs High Output
  Management, it stresses emotional intelligence and bravery over structured
  processes.
