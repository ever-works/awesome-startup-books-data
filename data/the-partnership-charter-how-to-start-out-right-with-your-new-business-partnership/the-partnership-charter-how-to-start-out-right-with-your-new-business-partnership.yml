markdown: >-
  ## Overview


  David Gage shows how to create partnership charters that address issues before
  they become problems. Based on decades mediating partnership disputes.


  ## The Partnership Charter


  Address upfront:

  - Decision-making authority

  - Financial contributions

  - Time commitments

  - Exit scenarios

  - Dispute resolution

  - Values and vision


  ## Key Topics


  - Equity splits and vesting

  - Roles and responsibilities

  - What if someone wants out?

  - Handling disagreements

  - Buy-sell agreements


  ## Why It Matters


  Most partnerships fail due to unaddressed expectations. A charter prevents 90%
  of future conflicts.


  ## Pricing


