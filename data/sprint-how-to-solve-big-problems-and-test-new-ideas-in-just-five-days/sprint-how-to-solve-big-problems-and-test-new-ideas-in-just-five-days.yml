markdown: |-
  ## Overview

  A practical guide to running a 'design sprint' to solve critical problems.

  ## Five Phases

  - **Monday**: Map and pick target.
  - **Tuesday**: Sketch solutions.
  - **Wednesday**: Storyboard, decide.
  - **Thursday**: Prototype.
  - **Friday**: Test with users.

