name: "Pattern Breakers: Why Some Start-Ups Change the Future"
description: A groundbreaking book that reveals the hidden forces behind outlier
  startup success. Written by Mike Maples Jr. and Peter Ziebelman, it challenges
  conventional startup wisdom by showing how the most successful founders think
  differently and break established patterns to create transformative companies.
