name: The Everything Store
description: Brad Stone's account of Jeff Bezos building Amazon emphasizes
  customer-first strategies, bold infrastructure investments, and innovations
  like Prime that redefined retail. Founders learn to tolerate misunderstanding
  for decades, iterate via data, and disrupt internally to evade quarterly
  pressure pitfalls. Compared to Nike's Shoe Dog, it dives into tech scalability
  vs consumer goods grit; key for marketplace and logistics inspiration.
