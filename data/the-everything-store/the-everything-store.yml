markdown: >-
  ## Overview


  The Everything Store: Jeff Bezos and the Age of Amazon by Brad Stone is the
  definitive account of Amazon's rise and Jeff Bezos's vision to build the
  everything store.


  ## Key Themes


  ### Customer Obsession

  - Start with the customer and work backward

  - Long-term customer value over short-term profit

  - The empty chair in meetings representing the customer

  - Relentless focus on customer experience


  ### Long-Term Thinking

  - Willingness to be misunderstood for long periods

  - Investing in infrastructure before it's needed

  - Accepting short-term losses for long-term gains

  - Building for decades, not quarters


  ### Innovation and Experimentation

  - AWS: From internal tool to cloud giant

  - Kindle: Cannibalizing book sales

  - Prime: Changing customer expectations

  - Marketplace: Empowering third-party sellers


  ### Operational Excellence

  - Obsession with metrics and data

  - Continuous process improvement

  - High standards and high expectations

  - Frugality as a core value


  ## Bezos's Leadership Principles


  - Customer obsession

  - Ownership

  - Invent and simplify

  - Hire and develop the best

  - Insist on the highest standards

  - Think big

  - Bias for action

  - Frugality


  ## The Amazon Way


  - Start small, think big

  - Make bold bets

  - Tolerate failure

  - Learn and iterate

  - Scale relentlessly


  ## Key Insights for Founders


  - Vision matters more than consensus

  - Infrastructure is competitive advantage

  - Culture eats strategy

  - Think in decades

  - Embrace disrupting yourself


  ## Awards


  - Financial Times Business Book of the Year 2013

  - New York Times and Wall Street Journal bestseller

  - Translated into 35+ languages


  ## Pricing


  Available in hardcover, paperback, ebook, and audiobook formats.
