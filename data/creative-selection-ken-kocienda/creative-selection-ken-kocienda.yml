name: "Creative Selection: Inside Apple's Design Process During the Golden Age
  of Steve Jobs"
description: Ken Kocienda recounts his role in crafting iPhone and iPad software
  at Apple, detailing the demo-driven culture, iterative refinement, and
  taste-making under Steve Jobs. Key takeaways for founders include prioritizing
  demos over docs, relentless iteration on details, and cultivating sharp
  judgment to ship breakthrough products; contrasts with broader biographies
  like Steve Jobs by focusing on engineering craft. Ideal for product leads
  seeking inspiration in high-stakes creativity and avoiding mediocre execution.
source_url: https://www.amazon.com/Creative-Selection-Inside-Apples-Process/dp/1250194466
category: Biographies
