markdown: >-
  ## Overview


  Crossing the Chasm is a seminal work on technology adoption and market
  segmentation, introducing the concept of the "chasm" between early adopters
  and the early majority.


  ## Key Concepts


  - Technology adoption lifecycle model

  - Early adopters vs. early majority

  - Strategies for crossing the chasm

  - Importance of targeting a niche market

  - Whole product concept


  ## Pricing


  Price varies by retailer and edition; typically available in paperback,
  hardcover, and e-book formats.
