name: Crossing the Chasm
description: Originally published in 1991, Crossing the Chasm was one of the
  first mainstream business books to focus on the different stages of technology
  product adoption. The book is based on the technology adoption lifecycle, a
  model that describes the adoption or acceptance of a new product or innovation
  by different segments of the market. Its particular focus is on the 'chasm'
  that exists between early adopters of a new innovation and the majority of the
  market. While the original edition of Crossing the Chasm is more than 30 years
  old, its framework is as relevant today as when it was first published.
source_url: https://www.geoffreyamoore.com/books/crossing-the-chasm/
