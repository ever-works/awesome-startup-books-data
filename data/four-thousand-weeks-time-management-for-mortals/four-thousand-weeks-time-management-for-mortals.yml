markdown: >-
  ## Overview


  Oliver Burkeman challenges productivity culture: you have ~4,000 weeks to
  live. You won't get it all done. Choose what matters.


  ## Core Insight


  The average human lifespan is about 4,000 weeks. Efficiency isn't the
  answer—acceptance and choice are.


  ## Key Principles


  - You can't do everything

  - Productivity hacks are avoidance

  - FOMO is guaranteed

  - Limits are liberating

  - Do what only you can do


  ## For Founders


  - Say no to almost everything

  - Accept you'll miss opportunities

  - Focus on what matters most

  - Stop optimizing, start choosing

  - Presence > productivity


  ## The Productivity Trap


  More efficiency just creates more to do. The to-do list never ends. Make peace
  with incompletion.


  ## Wisdom


  - Pay yourself first (with time)

  - Embrace your finitude

  - Choose meaningful constraints

  - Joy comes from doing, not finishing


  ## Pricing


  Published by Farrar, Straus and Giroux 2021. International bestseller.
