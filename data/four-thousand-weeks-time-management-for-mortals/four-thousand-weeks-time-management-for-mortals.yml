name: "Four Thousand Weeks: Time Management for Mortals"
description: "Oliver Burkeman's Four Thousand Weeks liberates entrepreneurs from
  productivity obsession, shifting mindset to embrace finitude, prioritize
  essentials, and find joy in limits for sustainable personal growth. Key use
  case: Overcoming FOMO and burnout by choosing meaningful work amid infinite
  tasks. Vs Atomic Habits, it rejects optimization hacks for philosophical
  acceptance."
