markdown: >-
  ## Overview


  Hacking Growth reveals the growth hacking methodology used by the
  fastest-growing companies to achieve massive scale.


  ## The Growth Hacking Process


  1. **Build a growth team** - Cross-functional collaboration

  2. **Determine if product is must-have** - Achieve product-market fit first

  3. **Identify your growth levers** - Find key metrics that drive growth

  4. **Test at high tempo** - Run rapid experiments

  5. **Analyze and optimize** - Learn and iterate


  ## The Growth Hacking Cycle


  - Analyze data

  - Generate ideas

  - Prioritize experiments

  - Run tests

  - Learn and iterate


  ## Key Tactics


  - Viral loops

  - Referral programs

  - Retention optimization

  - Activation improvements

  - Revenue expansion


  ## Pricing


  Available for approximately $17-28.
