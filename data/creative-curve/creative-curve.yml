markdown: >-
  ## Overview


  The Creative Curve reveals that creativity is not magical talent but a skill
  anyone can develop through deliberate practice.


  ## The Creative Curve


  The sweet spot between familiarity and novelty - ideas that feel fresh yet
  accessible.


  ## Four Laws of Creativity


  1. **Consumption**: Immerse yourself in your field

  2. **Imitation**: Copy and remix existing work

  3. **Creative Communities**: Find your support network

  4. **Iterations**: Repeat, refine, improve


  ## Pattern Recognition


  Creativity comes from recognizing patterns others miss, enabled by extensive
  consumption and iteration.


  ## Pricing


