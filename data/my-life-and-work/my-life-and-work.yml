name: My Life and Work
description: Henry Ford's autobiography shares founder lessons from building
  Ford Motor Company, including mass production innovation, efficient
  manufacturing, and worker motivation strategies. Founders learn principles of
  simplification, cost reduction, and scaling operations without bureaucracy.
  Classic insights into industrial entrepreneurship and leadership.
