markdown: >-
  ## Overview


  The Phoenix Project is a novel that teaches IT and DevOps principles through
  an engaging business narrative about an IT manager trying to save his company.


  ## The Three Ways


  **First Way - System Thinking**: Understanding the flow from development to
  operations to customers


  **Second Way - Amplify Feedback Loops**: Creating feedback from right to left


  **Third Way - Culture of Experimentation**: Creating a culture of continuous
  learning


  ## Key Lessons


  - Work in process is the silent killer

  - Unplanned work destroys productivity

  - Technical debt accumulates interest

  - Automation enables speed


  ## Impact


  Revolutionized how organizations think about IT operations and software
  delivery.


  ## Pricing


  Available for approximately $15-25.
