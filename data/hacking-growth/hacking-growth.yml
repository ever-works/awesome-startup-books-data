markdown: >-
  # Hacking Growth


  ## Overview

  Hacking Growth by Sean Ellis and Morgan Brown provides a framework for
  startups to achieve rapid, sustainable growth through experimentation and
  data-driven processes. It covers optimizing the entire customer lifecycle.


  ## Features

  - Growth hacking process and methodology

  - Techniques for optimizing customer acquisition

  - Strategies for improving retention and monetization

  - Building cross-functional growth teams

  - Real-world case studies from companies like LinkedIn, Airbnb, and Uber

  - Ethical considerations and sustainable growth practices


  ## Pricing

  Available in paperback, hardcover, Kindle, and audiobook. Prices typically
  range from $15 to $30.
