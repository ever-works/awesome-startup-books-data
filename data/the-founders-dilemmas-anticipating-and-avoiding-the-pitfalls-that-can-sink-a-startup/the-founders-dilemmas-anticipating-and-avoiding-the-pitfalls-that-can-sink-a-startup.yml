markdown: >-
  ## Overview


  Noam Wasserman studied 10,000 founders to identify the key decisions that make
  or break startups. Data-driven insights on founder dilemmas.


  ## The Core Dilemmas


  ### Career Dilemmas

  - When to found?

  - Solo or co-founder?

  - With whom?


  ### Relationship Dilemmas

  - How to split equity?

  - Roles and titles?

  - Decision-making authority?


  ### Investor Dilemmas

  - Angel or VC?

  - How much control to cede?

  - Board composition?


  ## Key Findings


  - Equal splits often fail

  - Hire slow, fire fast with co-founders

  - Vesting is essential

  - Friends/family are risky co-founders

  - Rich vs. King: choose one


  ## Rich vs. King


  You can't optimize for both:

  - **Rich**: Maximize financial outcome (take money, give up control)

  - **King**: Maintain control (bootstrap, slower growth)


  ## For Founders


  - Make hard decisions early

  - Use vesting always

  - Document everything

  - Anticipate dilemmas before they hit


  ## Pricing


