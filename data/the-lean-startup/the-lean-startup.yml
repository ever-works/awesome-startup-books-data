markdown: >-
  ## Overview


  The Lean Startup presents a scientific approach to creating and managing
  startups, focusing on customer feedback, iterative design, and validated
  learning.


  ## Key Concepts

  - Build-Measure-Learn feedback loop

  - Minimum Viable Product (MVP)

  - Validated learning through experiments

  - Innovation accounting

  - Pivot or persevere decisions


  ## Audience

  Ideal for entrepreneurs, product managers, and anyone looking to launch a new
  venture or innovate within an existing company.


  ## Pricing


  Pricing varies by edition and retailer; typically ranges from $10 to $30 for
  paperback and Kindle editions.
