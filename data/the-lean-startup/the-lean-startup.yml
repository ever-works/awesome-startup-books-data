markdown: >-
  ## Overview


  The Lean Startup is a methodology for developing businesses and products that
  aims to shorten product development cycles and rapidly discover if a proposed
  business model is viable. This is achieved through a combination of
  business-hypothesis-driven experimentation, iterative product releases, and
  validated learning.


  ## Features


  - Emphasis on validated learning through experiments

  - Build-Measure-Learn feedback loop

  - Minimum Viable Product (MVP) concept

  - Continuous deployment and split testing

  - Actionable metrics vs vanity metrics

  - Pivot or persevere decisions based on feedback


