markdown: >-
  ## Overview


  The Lean Startup by Eric Ries introduces a methodology for developing
  businesses and products that aims to shorten product development cycles and
  rapidly discover if a proposed business model is viable. This is achieved
  through a combination of hypothesis-driven experimentation, iterative product
  releases, and validated learning.


  ## Key Takeaways

  - Build-Measure-Learn feedback loop

  - Minimum Viable Product (MVP) concept

  - Continuous deployment and split testing

  - Actionable metrics vs. vanity metrics

  - Pivot or persevere decisions based on learning


  ## Pricing


  Typically priced between $15-$30 for paperback and $10-$20 for Kindle edition.
