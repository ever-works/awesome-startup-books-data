markdown: >-
  ## Overview


  Michael Gerber shows why most small businesses fail: founders work IN the
  business instead of ON the business. Build systems, not jobs.


  ## The E-Myth


  The Entrepreneurial Myth: being good at technical work means you can run a
  business doing that work. False.


  ## Three Personalities


  - **Technician**: Does the work

  - **Manager**: Plans and organizes

  - **Entrepreneur**: Envisions the future


  Most founders are 70% Technician. Need balance.


  ## The Turnkey Revolution


  Build your business like a franchise prototype:

  - Documented systems

  - Repeatable processes

  - Can run without you


  ## For Founders


  - Work ON business, not IN it

  - Document everything

  - Create systems for every role

  - Build to sell, even if you won't


  ## Pricing


  Published by HarperBusiness 1995. Over 4 million copies sold.
