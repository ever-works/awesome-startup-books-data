markdown: >-
  ## Overview


  Teaches how to talk to customers to discover problems worth solving without
  pitching your idea.


  ## Key Principles


  - Ask about specifics in their life, not your idea.

  - Talk about their life, not your solution.

  - Avoid compliments; dig for commitments or contradictions.


