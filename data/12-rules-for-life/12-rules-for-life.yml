name: 12 Rules for Life
description: Jordan Peterson's 12 Rules for Life equips entrepreneurs with
  principles for personal growth emphasizing responsibility, truthfulness, and
  strong relationships to overcome failure and chaos in startup life. Key
  mindset shifts include standing up straight with shoulders back and pursuing
  meaning over happiness, fostering resilience amid business pressures. Vs
  Atomic Habits, it focuses on profound philosophical rules rather than
  incremental behaviors.
