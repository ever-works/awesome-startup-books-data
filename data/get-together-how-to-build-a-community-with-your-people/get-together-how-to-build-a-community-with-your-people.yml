name: "Get Together: How to Build a Community With Your People"
description: Bailey Richardson et al. provide tactics for founders to spark,
  stoke, and sustain communities driving organic growth and retention. Key use
  cases include scaling user engagement metrics like participation rates for
  team-led loyalty vs. founder-led. Compared to Hacking Growth, it emphasizes
  community-led hypergrowth over tactical experiments.
