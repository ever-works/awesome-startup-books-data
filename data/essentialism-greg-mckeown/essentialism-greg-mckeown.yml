markdown: >-
  ## Overview


  Essentialism: The Disciplined Pursuit of Less is a New York Times and Wall
  Street Journal bestseller by Greg McKeown that presents a systematic
  discipline for discerning what is absolutely essential and eliminating
  everything that is not.


  ## Core Philosophy


  Essentialism is not about how to get more things done; it's about how to get
  the right things done. It doesn't mean just doing less for the sake of less
  either. It's about making the wisest possible investment of your time and
  energy in order to operate at your highest point of contribution.


  ## The Essentialist Way


  Essentialism is a disciplined, systematic approach for determining where our
  highest point of contribution lies, then making execution of those things
  almost effortless.


  ### Three Core Truths


  1. **"I choose to"** - Essentialists believe that almost everything is noise,
  and very few things really matter. The way of the essentialist means living by
  design, not by default.


  2. **"Only a few things really matter"** - Essentialists pause to
  discriminate. They deliberately distinguish the vital few from the trivial
  many.


  3. **"I can do anything but not everything"** - Essentialists live by
  the  truth that "less but better."


  ## The Essentialist Process


  ### Explore


  - Escape to discern the essential few from the trivial many

  - Look at problems from a different perspective

  - Play to spark creativity

  - Sleep to fuel your highest levels of contribution

  - Be selective with what you say "yes" to


  ### Eliminate


  - Clarify your essential intent

  - Dare to say "no" firmly, resolutely, yet gracefully

  - Uncommit from activities that no longer serve you

  - Edit your life ruthlessly

  - Set boundaries to protect what's important


  ### Execute


  - Create a buffer for the unexpected

  - Subtract to remove obstacles

  - Make progress in small, incremental steps

  - Create routines that make execution effortless

  - Focus on what's important now


  ## For Entrepreneurs


  For startup founders pulled in a thousand directions, essentialism provides a
  framework for protecting focus on the vital few initiatives that will truly
  move the needle rather than spreading thin across too many priorities.


  ## Key Quote


  "If you don't prioritize your life, someone else will."


  ## Pricing


  Available at major retailers for approximately $16-27.
