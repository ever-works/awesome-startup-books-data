markdown: >-
  ## Overview


  Same as Ever reverses the typical forecasting process by inviting readers to
  identify the many things that never change, rather than obsessing over
  predictions about what will change. Morgan Housel argues that universal
  principles guide behavior and these patterns offer far more value than
  forecasts about technology or markets.


  ## About the Author


  Morgan Housel is a partner at The Collaborative Fund and a former columnist at
  The Motley Fool and The Wall Street Journal. He is a two-time winner of the
  Best in Business Award and author of the international blockbuster The
  Psychology of Money, which has sold over 10 million copies.


  ## Core Premise


  While technology and society change dramatically, universal principles guide
  behavior. People fall for greed and fear, become short-sighted through
  overconfidence, and are persuaded by risk and jealousy—the same patterns that
  have existed throughout history.


  The book demonstrates that focusing on what stays the same provides a more
  reliable foundation for decision-making than trying to predict what will
  change.


  ## Content Structure


  The book shares 24 short stories about the ways that life, behavior, and
  business will always be the same. Each story drives home timeless lessons
  about:


  - Money and wealth

  - Risk and opportunity  

  - Storytelling and persuasion

  - Ambition and satisfaction

  - Decision-making under uncertainty


  ## Key Insights


  ### It's Not the Best Ideas That Win

  It's the best stories. Understanding how narratives shape reality is crucial
  for founders.


  ### Risk Is What You Don't See Coming

  The biggest dangers are the ones we don't anticipate, making humility and
  preparation more valuable than prediction.


  ### People Don't Want Accuracy, They Want Certainty

  This explains why bold predictions often gain more traction than nuanced
  analysis.


  ### The Seduction of Pessimism

  Why pessimism sounds smarter than optimism, even when optimism has been
  historically more accurate.


  ## Applications for Entrepreneurs


  Rather than chasing trends, founders can build enduring companies by
  understanding unchanging human behaviors:

  - People always want to feel important

  - Incentives shape behavior

  - Room for error provides resilience

  - Simplicity scales better than complexity


  ## Timeless Lessons on Risk and Opportunity


  The book teaches how to optimize decision-making by separating the signal from
  the noise, focusing on what you know will stay the same rather than what you
  think will change.


  ## Publication Details


  Published by Portfolio/Penguin Random House in 2023.
