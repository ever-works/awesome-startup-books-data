name: No Rules Rules
description: No Rules Rules reveals leadership lessons for founders on
  cultivating freedom and responsibility culture with high talent density and
  candid feedback for dynamic team building at scale. Key principles include
  keeper test for talent, 360 reviews for candor, and removing vacation policy
  controls. Vs High Output Management, it champions context over control for
  creative innovation.
