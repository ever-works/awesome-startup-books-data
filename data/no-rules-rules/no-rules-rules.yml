markdown: >-
  ## Overview


  Reed Hastings and Erin Meyer explain Netflix's radical culture of freedom and
  responsibility. High talent density, candor, and removing controls.


  ## Why It Matters for Founders


  This book provides essential insights for startup founders on company-culture,
  helping build successful companies through proven principles and practices.


  ## Pricing


  Available in multiple formats including hardcover, paperback, ebook, and
  audiobook.
