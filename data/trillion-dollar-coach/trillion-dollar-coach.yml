name: Trillion Dollar Coach
description: Trillion Dollar Coach imparts founders leadership lessons from Bill
  Campbell on team-first culture, trust-building, and coaching for scaling
  trillion-dollar companies. Key use cases include high-impact 1-on-1s, radical
  candor feedback, and fostering psychological safety in team building. Compared
  to High Output Management, it prioritizes relationships and emotional
  intelligence over operational systems.
source_url: https://www.trilliondollarcoach.com/
