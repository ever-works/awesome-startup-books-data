name: "The Founder's Mentality: How to Overcome the Predictable Crises of Growth"
description: Chris Zook and James Allen outline tactics to preserve insurgent
  mission, owner's mindset, and frontline obsession for founders scaling teams
  amid growth crises. Key metrics include frontline distance and bureaucracy
  indices for hypergrowth sustainability. Vs Blitzscaling, it counters
  speed-induced stall-outs with mentality preservation.
