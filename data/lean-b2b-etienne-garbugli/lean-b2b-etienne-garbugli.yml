markdown: >-
  ## Overview


  "Lean B2B: Build Products Businesses Want" by Étienne Garbugli is the
  definitive guide to customer development for B2B startups. Published in 2014,
  this book fills a critical gap by adapting lean startup and customer
  development methodologies specifically for the complex world of
  business-to-business markets.


  ## About the Author


  Étienne Garbugli works at the intersection of Tech, Product, and Marketing. He
  is:

  - A three-time startup founder (Highlights, Flagback, and HireVoice)

  - A five-time entrepreneur

  - A customer research expert

  - A recognized authority on B2B customer development


  ## Why This Book Was Written


  While customer development was born out of B2B enterprise selling from Steve
  Blank's "The Four Steps to the Epiphany," the body of knowledge available
  outside of that book was small to non-existent. Garbugli wrote Lean B2B to
  help entrepreneurs save time in the customer development process and
  successfully navigate the unique challenges of B2B markets.


  ## The B2B Challenge


  B2B markets present unique challenges compared to B2C:

  - Longer sales cycles with multiple decision-makers

  - Complex organizational buying processes

  - Higher switching costs and risk aversion

  - Smaller, more concentrated customer bases

  - Technical integration requirements

  - Compliance and security considerations


  Lean B2B provides specific techniques for navigating these challenges.


  ## What the Book Covers


  The book provides a comprehensive process consolidating the best thinking
  around B2B customer development:


  ### Assessing Market Potential

  - Evaluating B2B opportunities systematically

  - Understanding market size and dynamics

  - Identifying market timing and trends

  - Recognizing red flags early


  ### Finding Early Adopters

  - Identifying organizations with urgent problems

  - Finding innovators willing to try new solutions

  - Building relationships with potential beta customers

  - Accessing decision-makers in target companies


  ### Establishing Credibility

  - Building trust in B2B markets

  - Demonstrating expertise and capability

  - Using case studies and social proof

  - Overcoming the startup credibility gap


  ### Convincing Business Stakeholders

  - Understanding organizational politics

  - Building champion relationships

  - Creating compelling business cases

  - Navigating procurement processes


  ### Finding and Prioritizing Business Problems

  - Discovering problems worth solving in corporations

  - Understanding the cost and impact of problems

  - Validating problem urgency and budget

  - Prioritizing opportunities based on value


  ### Identifying Stakeholders with Purchase Decision Power

  - Mapping organizational decision-making

  - Finding economic buyers vs. champions

  - Understanding influence networks

  - Building relationships with key stakeholders


  ### Creating a Minimum Viable Product

  - Defining MVPs for B2B contexts

  - Balancing features with enterprise requirements

  - Managing security, compliance, and integration needs

  - Creating pilots and proof-of-concepts


  ### Creating a Compelling Offer

  - Developing value propositions for B2B

  - Pricing and packaging for enterprises

  - Creating pilot and trial programs

  - Structuring initial contracts


  ### Validating a Solution

  - Running effective B2B experiments

  - Getting meaningful customer feedback

  - Measuring B2B metrics that matter

  - Iterating based on enterprise customer needs


  ### Evaluating Product-Market Fit

  - Recognizing signals of B2B product-market fit

  - Measuring customer satisfaction and retention

  - Identifying when to scale vs. pivot

  - Building repeatable sales processes


  ## Over 20 Case Studies


  The book is packed with real-world case studies from B2B startups that have
  successfully navigated customer development, including examples from:

  - Enterprise SaaS companies

  - Developer tools and infrastructure

  - Business intelligence and analytics

  - Marketing and sales technology

  - And many other B2B sectors


  These case studies provide concrete examples of applying lean principles in
  B2B contexts.


  ## Key Frameworks and Techniques


  ### The B2B Customer Development Process

  A step-by-step methodology specifically designed for B2B markets, adapting
  lean startup principles to the realities of selling to businesses.


  ### Finding the Budget

  Techniques for understanding whether customers have budget allocated for
  solving the problem you address—a critical B2B validation.


  ### The Champion-Economic Buyer Split

  Understanding the difference between champions who advocate for your solution
  and economic buyers who control the budget.


  ### Enterprise Sales Learning Curve

  How to accelerate learning in markets with long sales cycles and small
  customer bases.


  ## Target Audience


  This book is essential for:

  - B2B SaaS founders

  - Enterprise software entrepreneurs

  - Product managers in B2B companies

  - Business development professionals

  - Anyone selling products or services to businesses

  - Investors evaluating B2B startups


  ## Differentiation from Other Lean Books


  While books like "The Lean Startup" and "Running Lean" provide general
  frameworks, Lean B2B specifically addresses:

  - The complexity of organizational buying

  - Longer sales cycles and validation timelines

  - Multiple stakeholders and decision-makers

  - Enterprise requirements and expectations

  - Smaller sample sizes for validation

  - Building credibility as a startup selling to enterprises


  ## Key Takeaways


  - B2B customer development requires different techniques than B2C

  - Focus on finding organizations with urgent, expensive problems

  - Understand that champions and economic buyers play different roles

  - Build credibility systematically through case studies and expertise

  - Validate that budget exists before investing in solutions

  - Product-market fit in B2B looks different than in B2C

  - Enterprise sales is about solving business problems, not features

  - Long sales cycles require patience but systematic learning


  ## Availability


  The book is available in multiple formats through Leanpub, Amazon, and other
  retailers. It has been used by thousands of entrepreneurs worldwide to build
  successful B2B businesses.


  ## Impact


  Lean B2B has become the standard reference for B2B customer development,
  filling a critical gap in the lean startup literature. It has helped countless
  B2B founders avoid common pitfalls and accelerate their path to product-market
  fit by providing specific, actionable guidance for the unique challenges of
  business-to-business markets.
