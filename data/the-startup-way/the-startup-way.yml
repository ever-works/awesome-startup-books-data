markdown: >-
  ## Overview


  The Startup Way shows leaders how to create entrepreneurial growth by
  instituting long-term innovation practices within their companies.


  ## Key Concepts


  ### Entrepreneurial Management

  Applying startup principles to established organizations:


  - Continuous innovation

  - Validated learning

  - Rapid experimentation

  - Metered funding


  ### The Growth Board

  A new organizational structure that provides oversight for entrepreneurial
  projects while protecting them from corporate bureaucracy.


  ### Innovation Accounting

  Metrics systems that track progress in conditions of extreme uncertainty.


  ## For Established Companies


  The book shows how companies like GE, Toyota, and Airbnb apply lean startup
  methods to:


  - Launch new products faster

  - Improve operational efficiency

  - Create sustainable innovation cultures

  - Compete with disruptive startups


  ## Pricing


  Available for approximately $18-30.
