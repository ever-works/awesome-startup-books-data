name: Big Magic
description: "Elizabeth Gilbert's Big Magic inspires entrepreneurs to live
  creatively beyond fear, fostering mindset shifts toward persistence and joy in
  idea pursuit despite startup failures. Key use case: overcoming creative
  blocks and self-doubt during product development or pivots. Vs Atomic Habits,
  it champions inspirational curiosity over structured routines."
