markdown: >-
  ## Overview

  Big Magic: Creative Living Beyond Fear offers insights into embracing
  creativity without being paralyzed by fear.


  ## Key Lessons

  - Fear is normal but should not control decisions; give it a seat but no vote.

  - Creativity thrives through persistence despite failure.

  - Grouped with The War of Art for shared messages on doing the work.


  ## Pricing

  Available in paperback, hardcover, ebook, and audiobook formats.
