name: Company of One
description: Paul Jarvis advocates intentional smallness for founders seeking
  sustainable profitability over endless scaling, using principles like defining
  'enough' revenue and customer depth focus. Frameworks for rejecting VC
  pressure and building resilient solo operations; contrasts growth obsession vs
  Porter's scale economies.
