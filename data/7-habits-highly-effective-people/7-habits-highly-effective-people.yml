markdown: >-
  ## Overview


  The 7 Habits of Highly Effective People is a business and self-help book
  written by Stephen R. Covey, first published in 1989. It has sold over 40
  million copies in 40 languages worldwide and is recognized as "The most
  influential business book of the Twentieth Century."


  ## Core Philosophy


  Covey presents a holistic, integrated, principle-centered approach for solving
  personal and professional problems. He reveals a step-by-step pathway for
  living with fairness, integrity, service, and human dignity, exploring the
  concept of effectiveness in achieving results, as well as the need to focus on
  character ethic rather than personality ethic.


  ## The Seven Habits Structure


  Covey intends the first three as a means of achieving independence, the next
  three as a means of achieving interdependence, and the last, seventh habit as
  a means to maintain the previous six.


  ### Private Victory (Independence)


  **Habit 1: Be Proactive**

  Take responsibility for your life. Focus on what you can control.


  **Habit 2: Begin with the End in Mind**

  Define clear measures of success and a plan to attain them. Create a personal
  mission statement.


  **Habit 3: Put First Things First**

  Prioritize important activities over urgent ones. Execute your priorities.


  ### Public Victory (Interdependence)


  **Habit 4: Think Win-Win**

  Seek mutually beneficial solutions. Collaborate rather than compete.


  **Habit 5: Seek First to Understand, Then to be Understood**

  Listen empathetically before expressing your own ideas.


  **Habit 6: Synergize**

  Combine the strengths of people through positive teamwork to achieve goals no
  one could have done alone.


  ### Renewal


  **Habit 7: Sharpen the Saw – Continuous Improvement**

  Balance and renew your resources, energy, and health to create a sustainable
  lifestyle. Focus on four dimensions: physical, spiritual, mental, and
  social/emotional.


  ## Leadership Impact


  Stephen Covey, an internationally respected leadership authority, realizes
  that true success encompasses a balance of personal and professional
  effectiveness. In August 2011, Time listed 7 Habits as one of "The 25 Most
  Influential Business Management Books."


  ## The Maturity Continuum


  Covey describes three sequential stages:


  1. **Dependence**: The paradigm of you—you take care of me

  2. **Independence**: The paradigm of I—I can do it

  3. **Interdependence**: The paradigm of we—we can do it together


