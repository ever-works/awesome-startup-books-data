markdown: >-
  ## Overview


  Jobs to be Done: Theory to Practice takes the Jobs-to-be-Done framework beyond
  theory and provides a practical, proven methodology for creating successful
  products. Anthony Ulwick pioneered this approach over 30 years, helping more
  than 1,000 companies achieve an 86% success rate in innovation.


  ## The Core Insight


  Customers don't buy products—they "hire" them to get a job done. Understanding
  the job, not the customer or the product, is the key to innovation success.


  ## What is a "Job to be Done"?


  A job is a task that people are trying to accomplish in their lives. Jobs are:

  - Functional (not emotional or social, primarily)

  - Stable over time (doesn't change with technology)

  - Solution-agnostic (defined independently of your product)

  - Measurable (customers know if the job is done well or poorly)


  **Example**: 

  - Not: "I want a better drill"

  - But: "I need to make a 1/4-inch hole in my wall to hang a picture"

  - Job: "Hang pictures on wall" (even more fundamental)


  ## The Outcome-Driven Innovation (ODI) Process


  Ulwick's ODI process consists of:


  ### 1. Define the Job

  - Identify the core functional job

  - Map the job to a universal job statement structure

  - Example: "Listen to music while on the go"


  ### 2. Uncover Desired Outcomes

  - Outcomes are metrics customers use to judge success

  - Structured format: "Minimize/Maximize [metric] when [circumstance]"

  - Example: "Minimize the time it takes to find a specific song"

  - Gather 50-150 desired outcomes through customer interviews


  ### 3. Quantify Outcomes

  - Survey customers on importance and satisfaction for each outcome

  - Identify which outcomes are underserved (high importance, low satisfaction)

  - This reveals opportunity


  ### 4. Find Opportunity

  - Calculate Opportunity Scores: Importance + (Importance - Satisfaction)

  - Underserved outcomes = innovation opportunities

  - Overserved outcomes = opportunities to simplify/reduce cost

  - Appropriately served outcomes = table stakes


  ### 5. Segment Around Unmet Needs

  - Segment by job, not demographics

  - Find groups with similar underserved outcomes

  - Much more predictive than traditional segmentation


  ### 6. Formulate Strategy

  - Target underserved market segments

  - Create concepts that address underserved outcomes

  - Validate concepts quantitatively


  ## Key Differences from Other Approaches


  **Traditional Market Research:**

  - Asks what customers want

  - Gets solutions ("I want a faster horse")

  - Can't measure or prioritize effectively


  **Jobs-to-be-Done:**

  - Uncovers the job and desired outcomes

  - Gets metrics ("Minimize time to travel between locations")

  - Can measure importance and satisfaction precisely


  ## What Founders Will Learn


  - How to identify the core functional job your product addresses

  - Conducting customer interviews that reveal outcomes, not features

  - Quantifying opportunity with surveys and statistical rigor

  - Segmenting markets by unmet needs instead of demographics

  - Creating product strategies based on data, not opinions

  - Why most innovation fails (addressing served or non-important outcomes)


  ## Real-World Results

   Companies using ODI have achieved:
  - 86% success rate (vs. 17% industry average)

  - Faster time to market (know what to build)

  - Higher margins (address underserved needs)

  - Better product-market fit from day one


  ## Case Studies in the Book


  - How Arm & Hammer discovered underserved outcomes in teeth whitening

  - How Bosch created a successful circular saw line

  - How Cordis created a winning stent technology

  - How Pearson Education targeted underserved student segments


  ## The 5 Growth Strategies


  Ulwick shows how Jobs-to-be-Done explains all innovation strategies:

  1. **Differentiated Strategy**: Target underserved outcomes

  2. **Dominant Strategy**: Satisfy all outcomes better than competitors

  3. **Disruptive Strategy**: Serve overserved customers at lower cost

  4. **Discrete Strategy**: Serve a specific job stage perfectly

  5. **Sustaining Strategy**: Maintain parity with evolving customer
  expectations


  ## Common Mistakes to Avoid


  - Confusing jobs with solutions ("I need a tablet" is not a job)

  - Focusing on emotional/social jobs when functional job isn't satisfied

  - Asking customers what they want instead of what outcomes matter

  - Segmenting by demographics instead of unmet needs

  - Building features customers say they want but aren't important


  ## For Startup Founders


  This methodology is especially powerful because:

  - Reduces risk of building the wrong thing

  - Identifies white space in existing markets

  - Creates defensible differentiation

  - Works before you have a product

  - Provides quantitative validation for investors


  ## About the Author


  Anthony Ulwick is founder and CEO of Strategyn, an innovation consultancy. He
  pioneered Jobs-to-be-Done Theory and invented Outcome-Driven Innovation®. For
  30+ years, he's helped over 1,000 companies including Microsoft, Johnson &
  Johnson, and Bosch.


