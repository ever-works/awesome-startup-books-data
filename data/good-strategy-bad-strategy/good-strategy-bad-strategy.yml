name: Good Strategy Bad Strategy
description: Richard Rumelt teaches founders to craft good strategy via
  diagnosis, guiding policy, and coherent actions, avoiding fluff like goal
  lists. Frameworks for pivot decisions under uncertainty; refines Porter's
  techniques with emphasis on kernel structure and execution focus.
