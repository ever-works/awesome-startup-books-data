markdown: >-
  ## Overview


  Richard Rumelt explains the difference between good and bad strategy. Good
  strategy is coherent action backed by an insightful diagnosis.


  ## Why It Matters for Founders


  This book provides essential insights for startup founders on strategy,
  helping build successful companies through proven principles and practices.


  ## Pricing


  Available in multiple formats including hardcover, paperback, ebook, and
  audiobook.
