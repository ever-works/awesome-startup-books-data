name: Act Like a Leader, Think Like a Leader
description: A leadership development book by INSEAD professor Herminia Ibarra
  that shows managers and executives how to evolve into stronger leaders by
  making small but deliberate changes in their jobs, networks, and sense of
  self—highly relevant for startup founders who must rapidly grow into broader
  leadership roles as their companies scale.
