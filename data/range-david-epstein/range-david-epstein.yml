markdown: >-
  ## Overview


  Range challenges the cult of hyper-specialization, showing how generalists
  often outperform specialists in our complex world.


  ## Key Arguments


  - Late specialization can be an advantage

  - Sampling period builds judgment

  - Analogical thinking solves novel problems

  - Match quality improves with exploration


  ## The Wicked World


  In "wicked" learning environments:

  - Rules aren't clear

  - Feedback is delayed or unclear

  - Patterns repeat less  

  - Breadth of experience helps


  ## For Entrepreneurs


  Founders benefit from diverse experiences that enable pattern recognition
  across domains.


  ## Pricing


  Available for approximately $17-28.
