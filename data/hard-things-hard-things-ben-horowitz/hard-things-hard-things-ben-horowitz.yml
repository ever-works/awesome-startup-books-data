name: "The Hard Thing About Hard Things: Building a Business When There Are No
  Easy Answers"
description: The Hard Thing About Hard Things arms founders with raw leadership
  lessons on surviving crises, layoffs, and peacetime vs wartime CEO transitions
  for resilient team building. Key principles include taking care of people
  first, grudgingly giving ground, and managing the struggle without excuses. Vs
  High Output Management, it confronts emotional realities and no-easy-answers
  decisions over systematic leverage.
