markdown: >-
  ## Overview


  Ben Horowitz, co-founder of Andreessen Horowitz and one of Silicon Valley's
  most respected entrepreneurs, offers essential advice on building and running
  a startup—practical wisdom for managing the toughest problems business school
  doesn't cover.


  ## Core Message


  This book provides honest, raw lessons from running a tech company through
  wartime—brutally honest, practical, with no fluff. If you're scaling through
  chaos, this book tells the truth about layoffs, morale, decision fatigue, and
  managing in the fog.


  ## Key Topics Covered


  ### The Struggle


  Horowitz describes "The Struggle"—the period when running a company becomes
  brutally difficult:


  - When people think you're lying even when you're telling the truth

  - When food loses its taste

  - When you're so far behind you feel like you'll never catch up


  ### Tough Management Decisions


  - How to lay people off

  - How to fire an executive

  - How to hire when you have no network

  - Whether to sell your company or not

  - How to be a CEO without losing your humanity


  ## Wartime CEO vs. Peacetime CEO


  One of the book's famous frameworks distinguishes between:


  **Peacetime CEO**: Focuses on expanding the market, building culture, and
  long-term growth


  **Wartime CEO**: Makes decisions for company survival, focuses on single goal,
  and leads with urgency


  ## Key Lessons


  - There are no shortcuts to knowledge

  - Take care of the people, the products, and the profits—in that order

  - Give ground grudgingly

  - Nobody cares about excuses


  ## Impact


  The book has become required reading for startup CEOs facing the brutal
  realities of leadership that business school doesn't teach.


  ## Pricing


  Available at major retailers for approximately $18-30.
