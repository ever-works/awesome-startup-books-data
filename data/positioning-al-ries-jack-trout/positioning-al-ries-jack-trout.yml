markdown: >-
  ## Overview


  Positioning is the first body of thought to come to grips with the problems of
  communicating to an overcommunicated society.


  ## Core Concept


  Positioning is not what you do to a product. Positioning is what you do to the
  mind of the prospect.


  ## Key Principles


  - Own a word in the prospect's mind

  - Be first in a category

  - Find the gap in the marketplace

  - Reposition competitors

  - Use the power of the negative


  ## Classic Examples


  - Avis: "We're #2, We Try Harder"

  - 7-Up: "The Uncola"

  - Volkswagen: "Think Small"


  ## Impact


  Revolutionized marketing and advertising, remains essential 50 years later.


  ## Pricing


  Available for approximately $15-25.
