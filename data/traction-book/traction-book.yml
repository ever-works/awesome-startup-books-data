markdown: >-
  ## Overview


  Traction presents a systematic approach to finding the marketing channels that
  will make your startup grow. The book introduces the Bullseye Framework for
  testing marketing channels.


  ## The 19 Traction Channels


  1. Viral Marketing

  2. Public Relations

  3. Unconventional PR

  4. Search Engine Marketing

  5. Social and Display Ads

  6. Offline Ads

  7. Search Engine Optimization

  8. Content Marketing

  9. Email Marketing

  10. Engineering as Marketing

  11. Targeting Blogs

  12. Business Development

  13. Sales

  14. Affiliate Programs

  15. Existing Platforms

  16. Trade Shows

  17. Offline Events

  18. Speaking Engagements

  19. Community Building


  ## The Bullseye Framework


  1. **Outer Ring**: Brainstorm all possible traction channels

  2. **Middle Ring**: Test the most promising channels

  3. **Inner Ring**: Focus on the channel that works best


  ## 50% Rule


  Spend 50% of your time on product and 50% on traction.


  ## Pricing


  Available for approximately $17-28.
