markdown: >-
  ## Overview


  "Inspired: How to Create Tech Products Customers Love" by Marty Cagan is the
  authority on building products customers want. The first edition, published
  ten years ago, established itself as the primary reference for technology
  product managers and can be found on the shelves of nearly every successful
  technology product company worldwide.


  ## About the Author


  Before founding the Silicon Valley Product Group to pursue his interests in
  helping others create successful products through his writing, speaking,
  advising and coaching, Marty Cagan served as an executive responsible for
  defining and building products for some of the most successful companies in
  the world, including Hewlett-Packard, Netscape Communications, and eBay.


  ## Key Topics Covered


  ### Assembling the Right People and Skills

  - How to structure and staff a vibrant and successful product organization

  - Building effective product teams

  - Defining roles and responsibilities


  ### Discovering the Right Product

  - Techniques for product discovery

  - Understanding customer needs

  - Validating product ideas before building


  ### Embracing Effective Processes

  - Lightweight yet effective product development processes

  - Balancing structure with agility

  - Modern product management techniques


  ### Scaling the Product Organization

  - Growing from small teams to large organizations

  - Maintaining product excellence at scale

  - Organizational design patterns


  ### Creating Strong Product Culture

  - Building a culture of innovation

  - Empowering product teams

  - Fostering product thinking throughout the organization


  ## Target Audience


  This book is essential reading for:

  - Product managers at all levels

  - Product designers and UX professionals

  - Engineering leaders and developers

  - Startup founders building technology products

  - Anyone involved in creating tech products


  ## Editions


  The second edition includes updated practices and techniques reflecting the
  evolution of product management over the past decade. The SVPG library also
  includes companion books: EMPOWERED, LOVED, and TRANSFORMED, available as the
  "PRODUCT IS HARD: SVPG Box Set."


  ## Impact


  One reviewer called it "If you only have one book on product management, this
  is the one." The book has become the standard reference for technology product
  managers worldwide and is widely considered the most comprehensive and
  authoritative guide to modern product management.
