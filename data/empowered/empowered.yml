name: Empowered
description: Empowered provides founders leadership lessons on organizational
  design to empower product teams for autonomous decision-making and effective
  team building in scaling companies. Key principles include outcome-focused
  trios, coaching models, and product operating models for high-velocity
  innovation. Vs High Output Management, it emphasizes distributed leadership
  and team empowerment over centralized control.
