markdown: >-
  ## Overview


  Empowered: Ordinary People, Extraordinary Products is Marty Cagan's 2020
  follow-up to his bestseller "Inspired." While Inspired focuses on product
  teams, Empowered addresses the leadership challenge of creating an environment
  where those teams can thrive.


  ## About the Author


  Marty Cagan is founder of the Silicon Valley Product Group (SVPG) and one of
  the most influential voices in product management. He's worked with hundreds
  of companies and has held senior product roles at major tech companies.


  ## Core Premise


  Most product teams are feature teams—essentially mercenaries told what to
  build. Empowered teams are missionaries—given problems to solve and trusted to
  discover the best solutions.


  ## The Empowered Product Team


  ### Characteristics

  - **Outcome-oriented**: Measured by results, not output

  - **Customer-focused**: Deep understanding of customers and business

  - **Enabled to experiment**: Can try different approaches

  - **Accountable**: Responsible for outcomes

  - **Collaborative**: Work together to solve problems


  ### The Product Trio

  Core team includes:

  - Product Manager (solves customer and business problems)

  - Product Designer (discovers and designs solutions)

  - Tech Lead (ensures feasible and scalable solutions)


  ## Leadership Transformation


  ### Product Leadership

  The book outlines the role of product leaders:

  - **Coaching**: Developing people and teams

  - **Staffing**: Hiring and retaining top talent

  - **Product Vision**: Inspiring teams with compelling vision

  - **Product Strategy**: Focusing teams on highest-value work

  - **Team Topology**: Structuring teams effectively

  - **Product Culture**: Establishing values and behaviors


  ### Coaching Model

  Leaders must coach on:

  - Product knowledge

  - Customer knowledge

  - Data/analytics knowledge

  - Industry/domain knowledge

  - Business knowledge


  ## Organizational Models


  ### The Product Operating Model

  Transitioning from:

  - Roadmaps of features → Solving assigned problems

  - Projects → Products

  - Stakeholder-driven → Empowered teams

  - Output → Outcomes


  ### Team Topology

  How to structure teams:

  - Platform teams vs. experience teams

  - Autonomous but aligned

  - Clear ownership and accountability

  - Minimize dependencies


  ## Product Vision and Strategy


  ### Product Vision

  - 2-10 year view

  - Inspires and provides purpose

  - Guides product strategy

  - Communicates what you're trying to achieve


  ### Product Strategy

  - How to realize the vision

  - Focus areas and sequencing

  - Resource allocation

  - Key insights that guide decisions


  ### Product Principles

  - Values that guide decisions

  - Resolve trade-offs

  - Reflect company values

  - Help teams make autonomous decisions


  ## Building Product Culture


  ### Key Cultural Elements

  - Customer-centric thinking

  - Innovation and experimentation

  - Rapid iteration

  - Ownership and accountability

  - Collaboration

  - Data-informed decisions

  - Urgency and speed


  ### Common Cultural Obstacles

  - Risk aversion

  - Consensus culture

  - Command and control

  - Short-term thinking

  - Siloed organizations


  ## Transforming Organizations


  ### Assessment

  - Identify current state

  - Understand constraints

  - Map stakeholder landscape

  - Assess culture and capabilities


  ### Strategy

  - Define target state

  - Identify change levers

  - Sequence transformation

  - Build coalition for change


  ### Execution

  - Start with pilot teams

  - Demonstrate success

  - Expand gradually

  - Evolve practices


  ## Common Transformation Challenges


  - Stakeholder resistance

  - Lack of trust in teams

  - Feature factory momentum

  - Wrong incentives and metrics

  - Insufficient coaching

  - Unclear vision and strategy

  - Poor team topology


  ## Comparison to Inspired


  **Inspired**: How product teams should work

  **Empowered**: How to create an organization where they can


  Empowered is for:

  - VPs of Product

  - CTOs and Engineering leaders

  - CEOs and founders

  - Anyone responsible for product organization


  ## Case Studies and Examples


  Features detailed examples from:

  - Companies that transformed successfully

  - Common pitfalls and how to avoid them

  - Different organizational contexts

  - Various company sizes and stages


  ## Product Operating Model (2024)


  Cagan released "TRANSFORMED" in 2024 building on Empowered, showing the
  product operating model becoming mainstream.


  ## Why It Matters for Founders


  Founders must build organizations that can scale beyond them. Empowered
  provides:

  - Framework for distributing decision-making

  - How to maintain quality while scaling

  - Building an innovation culture

  - Transitioning from founder-led to product-led


  ## Key Insights


  - Trust is foundational to empowerment

  - Empowerment without competence is abdication

  - Leaders must coach, not just manage

  - Strategy provides focus and alignment

  - Culture eats process for breakfast


  ## Practical Tools


  - Assessment templates

  - Coaching frameworks

  - Strategy formats

  - Team structures

  - Transformation playbooks


  ## Pricing


  Available in hardcover, paperback, ebook, and audiobook formats at standard
  retail prices.
