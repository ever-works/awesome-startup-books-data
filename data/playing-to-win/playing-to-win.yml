markdown: >-
  ## Overview


  Playing to Win: How Strategy Really Works by A.G. Lafley and Roger Martin is a
  Wall Street Journal and Washington Post bestseller that lays out a rigorous
  framework for strategy development. It's based on Lafley's experience leading
  P&G to unprecedented success.


  ## About the Authors


  **A.G. Lafley** was CEO of Procter & Gamble from 2000 to 2009 and again from
  2013 to 2015. Under his leadership, P&G doubled sales, quadrupled profits, and
  increased market value by over $100 billion.


  **Roger Martin** is a strategy adviser, former Dean of the Rotman School of
  Management, and one of the world's leading thinkers on strategy.


  ## The Five Strategy Choices


  The book presents strategy as a set of five cascading, integrated choices:


  1. **What is your winning aspiration?**
     - Define your purpose and aspirations
     - What does winning look like?
     - This is your guiding star

  2. **Where will you play?**
     - Which markets, geographies, customer segments?
     - What's in and what's out?
     - The art of making hard choices

  3. **How will you win?**
     - What's your competitive advantage?
     - How will you deliver unique value?
     - Where will you be better than competitors?

  4. **What capabilities must be in place?**
     - What activities and competencies are required?
     - What must you be great at?
     - Building your activity system

  5. **What management systems are required?**
     - What systems will support your strategy?
     - How will you measure and reinforce?
     - Enabling execution

  ## Strategic Choice Cascade


  These five choices must be coherent and mutually reinforcing. Each choice
  narrows the field of subsequent choices. Together they form an integrated
  strategy.


  ## Case Studies from P&G


  The book includes detailed examples:

  - Olay's transformation from declining brand to billion-dollar franchise

  - Gillette acquisition and integration

  - Developing market strategies in emerging economies

  - Innovation in core categories

  - Organizational restructuring to enable strategy


  ## Key Principles


  - **Strategy is Choice**: The essence of strategy is choosing what not to do

  - **Customer Focus**: Winning happens in the mind of the customer

  - **Competitive Advantage**: You must create value in a way competitors can't
  easily copy

  - **Integration**: All choices must fit together coherently

  - **Testing**: Use logic flow to test if your strategy will win


  ## The Strategy Logic Flow


  A reverse engineering tool to test strategies:

  1. For your aspiration to be realized, where must you play?

  2. To succeed in that arena, how must you win?

  3. To win in that way, what capabilities must be in place?

  4. To build those capabilities, what management systems are required?


  ## Common Strategy Mistakes


  - Confusing planning with strategy

  - Creating strategies that are too complex

  - Making so many choices you're not making any

  - Failing to make hard trade-offs

  - Copying competitors instead of differentiation

  - Not testing strategic logic


  ## Why It Matters for Founders


  Startups often lack clear strategy, trying to be everything to everyone. This
  framework forces hard choices about:

  - Target customers and markets

  - Unique value proposition

  - Core capabilities to build

  - What to say no to


  ## Application to Startups


  While the book uses P&G examples, the framework applies to any organization:

  - Defining winning in your market

  - Choosing your beachhead market

  - Articulating competitive differentiation

  - Building unique capabilities

  - Creating systems to execute


  ## Pricing


  Available in hardcover, paperback, ebook, and audiobook formats at standard
  retail prices.
