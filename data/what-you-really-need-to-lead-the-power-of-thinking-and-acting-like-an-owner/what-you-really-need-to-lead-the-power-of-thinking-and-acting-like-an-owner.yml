name: "What You Really Need to Lead: The Power of Thinking and Acting Like an Owner"
description: Robert Steven Kaplan’s book arguing that effective leadership
  starts from an ownership mindset, offering tools and techniques to align
  actions with personal and organizational aspirations. This is particularly
  relevant to startup founders who are literal owners and must cultivate
  owner-like thinking across their teams.
