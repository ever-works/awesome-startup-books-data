markdown: >-
  ## Overview


  April Dunford provides a step-by-step process for positioning products so
  customers immediately understand their value. Based on 25 years launching
  products at startups, this is the practical positioning playbook.


  ## The 10-Step Positioning Process


  1. Understand competitors

  2. Isolate unique features

  3. Map features to value

  4. Identify best-fit customers  

  5. Find the market you dominate

  6. Layer on trend/themes

  7. Capture mindshare with name

  8. Test positioning

  9. Roll out across company

  10. Monitor and adjust


  ## Key Concepts


  - Positioning = context for value

  - You can't be everything to everyone

  - Best customers see you as obviously awesome

  - Position in a market you can dominate


  ## About the Author


  April Dunford launched 16 products as VP Marketing at high-growth startups.
  Now CEO of Ambient Strategy.


  ## Pricing


  Self-published 2019. Updated edition 2026. Over 100,000 copies sold.
