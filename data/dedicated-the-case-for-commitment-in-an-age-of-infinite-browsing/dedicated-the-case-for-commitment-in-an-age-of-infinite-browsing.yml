markdown: >-
  ## Overview


  Dedicated examines why modern culture is stuck in "Infinite Browsing
  Mode"—endlessly swiping, searching, and refusing to commit—and makes a
  powerful case for the fulfillment that comes from deep, long-term commitments.


  ## About the Author


  **Pete Davis** works on civic projects aimed at deepening American democracy
  and solidarity, and is the cofounder of the Democracy Policy Network. His
  Harvard Law School graduation speech, "A Counterculture of Commitment," has
  been viewed more than 30 million times.


  ## Key Concepts


  ### Infinite Browsing Mode


  Davis describes modern culture as stuck in "Infinite Browsing Mode"—swiping
  through endless dating profiles without committing to a single partner,
  jumping from place to place searching for the next big thing, and refusing to
  make any decision that might close us off from an even better choice we
  imagine is just around the corner.


  ### The Central Tension


  This culture of restlessness and indecision is causing tension in the lives of
  young people today: We want to keep our options open, and yet we yearn for the
  purpose, community, and depth that can only come from making deep commitments.


  ### Long-Haul Heroes


  Davis shares what we can learn from the "long-haul heroes" who courageously
  commit themselves to particular places, professions, and causes—who relinquish
  the false freedom of an open future in exchange for the deep fulfillment of
  true dedication.


  ## Relevance for Entrepreneurs


  While not exclusively a startup book, Dedicated offers crucial insights for
  founders who must commit to their vision despite uncertainty, resist the
  temptation to constantly pivot, and build something meaningful over the long
  term.


  ## Origin Story


  The book originated from Davis's viral Harvard Law School commencement address
  about commitment, which resonated with millions experiencing the anxiety of
  too many options.


  ## Publication Details


  Published by Simon & Schuster.
