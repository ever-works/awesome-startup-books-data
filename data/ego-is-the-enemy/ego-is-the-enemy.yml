name: Ego is the Enemy
description: "Ryan Holiday's Ego is the Enemy teaches entrepreneurs to conquer
  ego for sustained success, shifting mindset to humility and lifelong learning
  to overcome aspiration, success, and failure pitfalls. Key use case:
  Maintaining clarity during startup highs and lows. Vs Atomic Habits, it
  addresses psychological barriers over behavioral systems."
