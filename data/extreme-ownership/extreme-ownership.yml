name: Extreme Ownership
description: Extreme Ownership instills founders with leadership lessons from
  Navy SEALs on total accountability, no-excuse culture, and decentralized
  command for superior team building and execution under pressure. Key
  principles include lead up and down the chain, prioritize and execute, and
  simplify plans for team alignment. Vs High Output Management, it delivers
  battle-tested discipline and ownership mindset over factory-style
  optimization.
