markdown: >-
  ## Overview


  An Elegant Puzzle focuses on the particular challenges of engineering
  management—from sizing teams to handling technical debt to performing
  succession planning—and provides a path to the good solutions. Drawing on his
  experience at Digg, Uber, and Stripe, Larson presents a thoughtful approach to
  engineering management that balances structured principles with human-centric
  thinking.


  ## Key Topics


  ### Organizations

  - Sizing engineering teams effectively

  - Creating efficient organizational structures

  - Managing organizational change and growth


  ### Tools

  - Systems thinking approaches to management

  - Introduction management and career narratives

  - Performance management frameworks


  ### Approaches

  - Working with product management

  - Partnering across the organization

  - Evolving engineering strategy


  ### Culture

  - Opportunity and membership

  - Select project velocity over predictability

  - Presenting to senior leadership


  ## Writing Style and Approach


  The book takes a systems thinking approach, breaking down complex management
  challenges into understandable frameworks. Larson's writing is direct and
  practical, often sharing specific examples and templates that readers can
  adapt.


  ## About the Author


  Will Larson has been an engineering leader and software engineer at technology
  companies of many shapes and sizes, including Yahoo!, Digg, SocialCode, Uber,
  and, since 2016, Stripe. The book draws from writing in his blog, Irrational
  Exuberance!, that he has been updating since graduating from college.


  ## Reception


  Described as "the most hands-on perspective on engineering management within a
  high-growth, tech-first organization" and praised for its practical,
  immediately applicable advice. The book is not just for engineering managers:
  product managers and engineers working at high-growth companies will find it
  valuable.


  ## Practical Value


  Provides specific frameworks, diagrams, and mental models that can be
  immediately applied to real management challenges. Particularly noted for its
  approach to organizational design and scaling teams.


  ## Publication Details


  Published by Stripe Press on May 28, 2019. Available in hardcover, ebook, and
  audiobook formats.


  ## Pricing


  Available for purchase through major retailers including Amazon, Barnes &
  Noble, and the Stripe Press website.
