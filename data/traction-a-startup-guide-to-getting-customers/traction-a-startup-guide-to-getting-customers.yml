markdown: >-
  ## Overview


  Traction outlines strategies for startups to find effective ways to get
  customers using the Bullseye framework: brainstorm channels, prioritize, test
  traction, and focus.


  ## Key Channels


  - Targeting blogs

  - Publicity/PR

  - Unconventional PR

  - Paid search/SEM

  - Social and display ads

  - Offline ads

  - SEO

  - Content marketing

  - Email marketing

  - Engineering as marketing

  - Viral marketing

  - Business development

  - Sales

  - Affiliate programs

  - Existing platforms

  - Trade shows

  - Offline events/seminars

  - Speaking engagements

  - Community building


