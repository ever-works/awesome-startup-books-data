markdown: >-
  ## Overview


  Made to Stick: Why Some Ideas Survive and Others Die is a book by brothers
  Chip and Dan Heath published by Random House on January 2, 2007. The Heath
  brothers tackle head-on the vexing questions of why some ideas thrive while
  others die.


  ## The Authors


  **Chip Heath** is a professor at Stanford Graduate School of Business,
  teaching courses on strategy and organizations.


  **Dan Heath** is a senior fellow at Duke University's CASE center, which
  supports entrepreneurs fighting for social good, and lives in Durham, North
  Carolina.


  ## The Six Principles (SUCCESs)


  The authors credit six key principles that make ideas "stick":


  ### 1. **S**implicity

  Find the core of the idea. Strip it to its essential message.


  ### 2. **U**nexpectedness

  Grab people's attention by violating expectations. Use surprise to make ideas
  memorable.


  ### 3. **C**oncreteness

  Make ideas clear and specific with concrete images and language that people
  can visualize.


  ### 4. **C**redibility

  Give ideas believability through statistics, vivid details, or testable
  credentials.


  ### 5. **E**motions

  Make people care about an idea by appealing to their emotions and
  self-interest.


  ### 6. **S**tories

  Enable action through narrative. Stories provide simulation (knowledge about
  how to act) and inspiration (motivation to act).


  ## Key Concepts


  The brothers Heath reveal the anatomy of ideas that "stick" and explain
  sure-fire methods for making ideas stickier, such as:


  - Violating schemas to create surprise

  - Using the Velcro Theory of Memory

  - Creating "curiosity gaps" that compel people to learn more


  ## Commercial Success


  Made to Stick made the New York Times and Wall Street Journal bestseller lists
  and was retired from the BusinessWeek list after a 24-month run. It was named
  to several "best of the year" lists and was selected as one of the best 100
  business books of all time.


  ## Practical Applications


  The book is invaluable for:


  - Entrepreneurs pitching their ideas

  - Marketers crafting campaigns

  - Teachers making lessons memorable

  - Leaders communicating vision

  - Anyone trying to make their message heard


  ## Impact


  The SUCCESS framework has become a standard tool for business communicators,
  educators, and leaders worldwide who need to make their ideas resonate.


  ## Pricing


  Available at major retailers for approximately $16-28.
