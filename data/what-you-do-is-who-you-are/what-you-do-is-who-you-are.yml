markdown: >-
  ## Overview


  What You Do Is Who You Are: How to Create Your Business Culture is a book by
  Ben Horowitz that explores how to design and sustain great company culture.
  Horowitz examines historical figures and modern case studies to extract
  lessons on building culture that shapes behavior.


  ## About the Author


  Ben Horowitz is the co-founder of the venture capital firm Andreessen Horowitz
  and author of the bestseller "The Hard Thing About Hard Things." His firm has
  invested in companies including Facebook, Twitter, Airbnb, and GitHub.


  ## Core Premise


  **Culture is not what you say, it's what you do.**


  Culture is the collective behavior of your organization—how people make
  decisions, what they prioritize, and what actions they take when no one is
  watching.


  ## Four Historical Case Studies


  ### 1. Toussaint Louverture (Haitian Revolution)

  **Lesson**: Creating culture in chaos

  - Built discipline and unity among former slaves

  - Established codes of conduct

  - Used symbols and rituals

  - Made culture explicit through written codes

  - Enforced culture through consequences


  ### 2. The Samurai

  **Lesson**: Building identity through bushido

  - Seven virtues of bushido defined behavior

  - Culture as competitive advantage

  - Honor and reputation drove decisions

  - Rituals reinforced values

  - Stories transmitted culture


  ### 3. Genghis Khan

  **Lesson**: Inclusion and meritocracy

  - Promoted based on merit, not birth

  - Incorporated conquered people's best practices

  - Rewarded loyalty over ethnicity

  - Created systems that scaled

  - Built culture around excellence


  ### 4. Shaka Senghor (Prison Reform)

  **Lesson**: Changing culture from within

  - Transformed himself in prison

  - Created culture of learning and growth

  - Used stories to reshape identity

  - Demonstrated possibility of change

  - Built new norms through example


  ## Key Principles


  ### Culture Must Be Designed

  Culture isn't what you hope for—it's what you create through:

  - Explicit values and behaviors

  - Stories that illustrate values

  - Symbols and language

  - Consequences for violating culture

  - Rituals that reinforce culture


  ### Actions Over Words

  What leaders do matters more than what they say:

  - The decisions you reward

  - The behaviors you tolerate

  - How you spend your time

  - Who you promote

  - What you celebrate


  ### Culture Is Shockingly Powerful

  Strong culture enables:

  - Distributed decision-making

  - Consistent behavior at scale

  - Speed and autonomy

  - Alignment without micromanagement

  - Resilience through change


  ## Creating Culture


  ### 1. Define the Virtues

  - What behaviors do you want?

  - Be specific and memorable

  - Make them actionable

  - Explain the "why" behind each


  ### 2. Tell the Right Stories

  - Use narratives to illustrate values

  - Make heroes of those who embody culture

  - Share both victories and failures

  - Ensure stories are memorable


  ### 3. Create Symbols and Language

  - Develop shared vocabulary

  - Use symbols that represent values

  - Create cultural artifacts

  - Build identity through language


  ### 4. Design Rituals

  - Regular practices that reinforce culture

  - Onboarding processes

  - Recognition ceremonies

  - Team gatherings

  - Decision-making rituals


  ### 5. Enforce Culture Through Consequences

  - Reward alignment with culture

  - Address violations quickly

  - Make examples (both positive and negative)

  - Be consistent


  ## Modern Case Studies


  ### Uber's Culture Crisis

  How misaligned culture led to:

  - Toxic work environment

  - Regulatory battles

  - Reputation damage

  - Leadership turnover


  Lessons on what not to do.


  ### Netflix's Culture Deck

  How Netflix built culture around:

  - Freedom and responsibility

  - High performance

  - Context not control

  - Radical honesty


  ### Other Examples

  - Slack's emphasis on empathy

  - Apple's secrecy and excellence

  - Amazon's customer obsession

  - Stripe's writing culture


  ## Common Culture Mistakes


  ### Confusing Perks with Culture

  - Free food isn't culture

  - Pool tables don't create values

  - Perks are nice but don't drive behavior


  ### Writing Generic Values

  - "Innovation, teamwork, excellence" are meaningless

  - Values must be specific to your context

  - Should guide difficult decisions

  - Must differentiate you from competitors


  ### Not Enforcing Culture

  - Tolerating violations sends wrong message

  - Inconsistent enforcement destroys credibility

  - High performers who violate culture must go


  ### Letting Culture Drift

  - Culture requires active maintenance

  - Must evolve as company grows

  - Can't assume it perpetuates itself

  - Leadership attention is essential


  ## Culture and Inclusion


  Horowitz emphasizes:

  - Culture isn't about everyone being the same

  - Best cultures are inclusive and meritocratic

  - Genghis Khan succeeded by incorporating diversity

  - Define culture by behavior, not background

  - Create belonging for different perspectives


  ## Practical Applications


  ### For Founders

  - Design culture from day one

  - Make values explicit early

  - Hire for culture contribution (not just fit)

  - Model the behaviors you want

  - Invest time in culture maintenance


  ### Changing Existing Culture

  - Acknowledge current state honestly

  - Define target culture clearly

  - Start with leadership behavior

  - Be patient but persistent

  - Expect resistance


  ### Scaling Culture

  - Document culture explicitly

  - Train new hires intensively

  - Empower culture carriers

  - Create systems that reinforce culture

  - Adapt while preserving core


  ## Why It Matters for Startups


  Culture determines:

  - Quality of decisions when founders aren't present

  - Ability to scale without breaking

  - Type of talent you attract and retain

  - Speed and effectiveness of execution

  - Whether you achieve your mission


  ## Comparison to Other Culture Books


  Unlike many culture books, Horowitz:

  - Uses historical examples, not just business cases

  - Focuses on behavior, not aspirations

  - Provides specific, actionable guidance

  - Addresses culture change, not just creation

  - Emphasizes enforcement and consequences


  ## Key Quote


  "Your culture is how your company makes decisions when you're not there. It's
  the set of assumptions your employees use to resolve the problems they face
  every day."


