markdown: >-
  ## Overview


  Michael Watkins provides a roadmap for leaders in transition—whether new CEO,
  joining a board, or taking on expanded responsibilities.


  ## The Framework


  ### First 30 Days

  - Promote yourself mentally

  - Accelerate your learning

  - Match strategy to situation

  - Secure early wins


  ### Days 30-60

  - Negotiate success

  - Achieve alignment

  - Build your team


  ### Days 60-90

  - Create coalitions

  - Keep your balance

  - Accelerate everyone


  ## STARS Model


  - **Start-up**: Building from scratch

  - **Turnaround**: Saving failing unit

  - **Accelerated Growth**: Scaling fast

  - **Realignment**: Fixing drift

  - **Sustaining Success**: Maintaining momentum


  Each requires different strategies.


  ## For Founders


  - Applies to every new growth stage

  - Transitioning from doer to leader

  - Bringing on executives

  - Role changes as company scales


  ## Pricing


  Published by Harvard Business Review Press 2013. Updated edition. Global
  bestseller.
