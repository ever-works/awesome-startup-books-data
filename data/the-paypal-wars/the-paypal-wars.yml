name: The PayPal Wars
description: Eric Jackson recounts PayPal's chaotic founding, mafia-like
  internal battles, fraud fights, and eBay clashes that birthed the PayPal
  Mafia. Founders gain tactics on viral referrals, regulatory navigation, and
  contrarian hiring to evade fraud pitfalls and incumbent threats. Vs Lost and
  Founder, it celebrates scrappy wins amid dysfunction; key for fintech builders
  seeking network-effect inspiration and crisis management.
