markdown: >-
  ## Overview


  The PayPal Wars: Battles with eBay, the Media, the Mafia, and the Rest of
  Planet Earth chronicles the dramatic early history of PayPal from an insider's
  perspective. Eric M. Jackson was recruited by Peter Thiel to join the startup
  team, where he oversaw product marketing and designed PayPal's revenue model.


  ## About the Author


  Eric M. Jackson joined PayPal as employee #30 and served as director of U.S.
  marketing from 2000 to 2002. During his tenure, the company grew from 25,000
  to 25 million users, went public, and was acquired by eBay for $1.5 billion.


  ## Key Topics


  - **The PayPal Mafia**: How Peter Thiel, Elon Musk, Reid Hoffman, and others
  built PayPal and went on to reshape technology

  - **Competitive Battles**: Fighting off competitors including X.com (Musk's
  company that merged with Confinity), eBay's Billpoint, and traditional banks

  - **Regulatory Challenges**: Navigating complex financial regulations as a
  disruptive payments startup

  - **Fraud and Security**: Combating the Russian Mafia and organized crime
  targeting the platform

  - **Growth Hacking**: Pioneering viral growth strategies including the $10
  referral bonus program

  - **Corporate Culture**: Building a team of ambitious, contrarian thinkers


  ## Historical Significance


  The PayPal Wars provides a detailed account of one of Silicon Valley's most
  influential companies. Many PayPal alumni went on to found or lead companies
  including Tesla, SpaceX, LinkedIn, YouTube, Yelp, and Palantir, making
  PayPal's story essential reading for understanding modern tech
  entrepreneurship.


  ## Lessons for Founders


  - How to compete against entrenched incumbents

  - The importance of product-market fit and rapid iteration

  - Navigating regulatory uncertainty in new markets

  - Building and scaling viral growth loops

  - Managing through crisis and near-death experiences

  - The value of hiring exceptional talent


  ## Pricing


  Available in paperback, ebook, and audiobook formats at standard retail
  prices.
