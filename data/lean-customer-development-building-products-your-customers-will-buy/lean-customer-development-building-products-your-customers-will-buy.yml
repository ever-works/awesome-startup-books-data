name: "Lean Customer Development: Building Products Your Customers Will Buy"
description: Cindy Alvarez's practical guide to customer development for product
  teams. Learn how to talk to customers and validate ideas before building,
  based on her experience at Yammer and Microsoft.
source_url: https://www.oreilly.com/library/view/lean-customer-development/9781449356354/
category: Customer Development
tags:
  - customer-development
