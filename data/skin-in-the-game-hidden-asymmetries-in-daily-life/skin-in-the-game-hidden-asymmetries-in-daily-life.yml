markdown: >-
  ## Overview


  Skin in the Game is the fifth book in Nassim Nicholas Taleb's Incerto series,
  published in 2018. The book became a #1 New York Times bestseller and has been
  translated into over 41 languages.


  ## Core Concept


  Taleb's central thesis is that skin in the game—having a shared risk when
  taking a major decision—is necessary for fairness, commercial efficiency, and
  risk management, as well as being necessary to understand the world. The book
  explores the hidden asymmetries in daily life where some people benefit from
  decisions while others bear the risks.


  ## Key Themes


  - **Risk Symmetry**: Never trust advice from someone who doesn't have downside
  exposure to their recommendations

  - **Ethical Decision-Making**: Those who have skin in the game are more
  careful, ethical, and accountable

  - **Intellectual Yet Idiot (IYI)**: Taleb introduces this concept to describe
  people who give advice without bearing consequences

  - **Lindy Effect**: Things that have been around longer are likely to stay
  around longer

  - **Via Negativa**: Removing bad is better than adding good


  ## The Incerto Series


  This book is part of Taleb's multi-volume philosophical essay on uncertainty,
  which includes:

  - Fooled by Randomness (2001)

  - The Black Swan (2007–2010)

  - The Bed of Procrustes (2010–2016)

  - Antifragile (2012)

  - Skin in the Game (2018)


  ## Relevance for Startup Founders


  For entrepreneurs, this book is essential reading because:

  - It teaches how to identify who has real expertise versus who is just talking

  - It emphasizes the importance of founders having their own capital and
  reputation at stake

  - It provides frameworks for evaluating advisors, investors, and partners

  - It challenges conventional wisdom about risk-taking and decision-making


  ## Critical Reception


  The book received widespread acclaim for its contrarian insights and practical
  philosophy. It applies across ethics, finance, and leadership, making it
  particularly valuable for founders navigating complex decisions.


  ## Pricing


  Available in hardcover, paperback, ebook, and audiobook formats through major
  retailers. Prices vary by format and retailer.
