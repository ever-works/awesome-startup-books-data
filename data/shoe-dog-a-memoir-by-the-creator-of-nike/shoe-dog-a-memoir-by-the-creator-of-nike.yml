name: "Shoe Dog: A Memoir by the Creator of Nike"
description: Phil Knight's memoir chronicles the founding and growth of Nike
  from importing shoes to global dominance, highlighting lessons for founders on
  relentless persistence, building key partnerships, embracing calculated risks,
  and pivoting through financial crises. It offers practical insights into
  fostering loyal teams and avoiding complacency in consumer brand building.
  Contrasts with VC-driven stories by emphasizing bootstrapped grit.
