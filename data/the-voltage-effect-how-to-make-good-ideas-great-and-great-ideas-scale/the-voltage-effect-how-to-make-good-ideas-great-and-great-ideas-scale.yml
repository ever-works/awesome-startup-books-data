markdown: >-
  ## Overview


  The Voltage Effect focuses on "high voltage"—the ability for an idea to be
  replicated at scale. Published in 2022, the book addresses the critical
  question: can an idea that works in a small group achieve the same success in
  a much larger one? This is essential for everything from expanding a small
  business to delivering billions of doses of a vaccine.


  ## The Voltage Drop


  When a seemingly promising idea loses efficacy or profitability as it expands,
  this is called a "voltage drop." List argues that scaling is subject to the
  "Anna Karenina principle," which dictates that even if one factor is wrong,
  the entire endeavor will fail.


  ## The Five Vital Signs of a Scalable Idea


  List identifies five measurable vital signs that a scalable idea must possess:


  1. **False Positives**: Avoid erroneous signs that success will continue as
  your enterprise grows

  2. **Knowing Your Audience**: Understand exactly who the idea works for and
  why

  3. **Chef vs. Ingredients**: Determine if success depends on unique talent or
  replicable processes

  4. **Spillovers**: Anticipate unintended consequences and engineer positive
  spillovers

  5. **Cost Trap**: Ensure your idea won't be too costly to sustain at scale


  ## Proven Strategies


  The book offers strategies for:

  - Avoiding voltage drops during expansion

  - Engineering voltage gains to amplify success

  - Identifying scalable vs. non-scalable elements

  - Making data-driven scaling decisions


  ## About the Author


  John A. List is the Kenneth C. Griffin Distinguished Service Professor of
  Economics at the University of Chicago. He has worked as chief economist at
  Uber, Lyft, and now Walmart, bringing academic rigor to real-world business
  challenges.


  ## Real-World Applications


  The book draws on List's extensive field experiments and consulting
  experience, providing concrete examples from technology, healthcare,
  education, and business.


  ## Target Audience


  Essential reading for entrepreneurs, executives, policymakers, and anyone
  responsible for taking successful pilots or programs to scale.


  ## Publication Details


  Published by Currency in 2022, 288 pages. Available in hardcover, paperback,
  ebook, and audiobook formats through major retailers.
