name: "The Voltage Effect: How to Make Good Ideas Great and Great Ideas Scale"
description: University of Chicago economist John A. List explores why some
  ideas scale successfully while others fail. Drawing on decades of research and
  experience at companies like Uber and Walmart, List provides a framework for
  identifying which ideas have 'voltage' and can grow from small successes to
