markdown: >-
  ## Overview


  DeMarco and Lister's timeless insights on managing technical teams. The major
  problems are not technical—they're sociological.


  ## Core Thesis


  The major issues in software development are people issues, not technical
  issues. Productivity comes from creating the right environment.


  ## Key Insights


  ### On Productivity

  - Best performers are 10x more productive than worst

  - Difference is not innate talent—it's environment

  - Quiet, private space matters enormously

  - Flow state requires uninterrupted time

  - Interruptions destroy productivity


  ### The Furniture Police

  Open offices kill productivity:

  - 62% more interruptions

  - Harder to achieve flow

  - Privacy enables deep work

  - Noise is the enemy


  ### Team Jell

  Great teams have:

  - Sense of elite status

  - Joint ownership

  - Mutual enjoyment

  - Low turnover

  - Shared purpose


  Management can kill jell through:

  - Defensive management

  - Bureaucracy

  - Physical separation

  - Fragmentation of time

  - Sacrifice of quality


  ## For Technical Founders


  - Hire great people, get out of the way

  - Provide quiet space

  - Protect focus time

  - Let teams gel naturally

  - Quality time > quantity

  - Trust > surveillance


  ## The Thyroid Principle


  The manager's function is not to make people work, but to make it possible for
  people to work.


  ## On Hiring


  - Aptitude > experience

  - Portfolio > resume

  - Audition (trial project)

  - Hire for success, not to avoid failure


  ## Pricing


  Published by Addison-Wesley 1987. 3rd edition 2013. 272 pages. Software
  management classic.
