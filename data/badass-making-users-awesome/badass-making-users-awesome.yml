markdown: >-
  ## Overview


  Kathy Sierra's revolutionary book: sustainable success comes not from making
  an awesome product, but from making users awesome at what they do with your
  product.


  ## Core Thesis


  Users don't care how awesome your product is. They care about how awesome THEY
  are when using it. Help them become badass and they'll never leave.


  ## The Badass User Path


  1. **Novice**: Can't do it

  2. **Advanced Beginner**: Can do some

  3. **Competent**: Reliable results

  4. **Expert**: Effortless mastery (the goal)


  ## Key Principles


  - Reduce cognitive load everywhere

  - Practice makes permanent (not perfect)

  - Small, frequent progress beats big leaps

  - Design for post-UX: what users can DO


  ## The Cognitive Budget


  Users have limited brain resources:

  - Don't waste them on your UI

  - Save them for the user's actual work

  - Every unnecessary click drains the budget


  ## Compelling Context


  Make practice irresistible:

  - High-quality examples

  - Fast feedback loops

  - Incremental challenges

  - Celebrate progress


  ## For Product Builders


  - Focus on user superpowers, not features

  - Measure expert users created, not MAU

  - Onboarding should create first success ASAP

  - Build skills progressively


  ## Pricing


  Published by O'Reilly 2015. From creator of bestselling Head First series.
