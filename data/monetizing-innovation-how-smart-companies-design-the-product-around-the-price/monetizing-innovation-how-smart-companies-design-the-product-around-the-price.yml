name: "Monetizing Innovation: How Smart Companies Design the Product Around the
  Price"
description: Madhavan Ramanujam's willingness-to-pay discovery equips founders
  to price-test before building, preventing feature shock and undead products in
  pivots. Frameworks like innovation failure types and 9 pricing rules for
  profitable launches; execution-focused vs Porter's structural analysis.
