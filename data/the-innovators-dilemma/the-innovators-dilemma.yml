name: The Innovator's Dilemma
description: The Innovator’s Dilemma is another classic business book that every
  founder should read. First published in 1997, the book focuses on why
  incumbent companies consistently struggle to adapt to disruptive technologies.
  Through a detailed study of multiple industries across several decades,
  Christensen unpacks the structural factors that prevent incumbents from
  reacting to disruption. For any founder who’s ever been asked 'What if Google
  builds this?' (or who wants to better understand how their ‘David’ can conquer
  ‘Goliath’), this book is a must-read.
source_url: https://www.claytonchristensen.com/book/the-innovators-dilemma/
