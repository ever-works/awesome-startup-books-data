markdown: >-
  ## Overview


  The Innovator's Dilemma explains why successful companies fail when confronted
  with disruptive technologies and how to avoid that fate.


  ## Key Concepts


  - Sustaining vs. disruptive innovation

  - Why successful companies ignore disruptive technologies

  - The resource dependence theory

  - How to create an independent unit for disruptive projects

  - Case studies: disk drives, excavators, etc.


  ## Pricing


  Price varies by retailer and edition; available in paperback, hardcover, and
  e-book formats.
