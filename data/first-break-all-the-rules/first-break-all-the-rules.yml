name: First, Break All the Rules
description: First, Break All the Rules teaches founders leadership lessons on
  managing to strengths, selecting for talent, and focusing on outcomes for
  powerful team building. Key principles include casting right people in right
  roles, defining clear expectations, and ignoring conventional management
  dogma. Vs High Output Management, it prioritizes individual talents and Gallup
  research over process optimization.
