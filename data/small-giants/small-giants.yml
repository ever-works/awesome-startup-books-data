name: Small Giants
description: Bo Burlingham profiles companies choosing greatness over size,
  teaching founders to build via strong culture, employee ownership, and
  community ties for resilient strategies. Ideal for pivots to lifestyle models
  rejecting VC scale; contrasts growth dogma vs Porter's competitive scale
  advantages.
