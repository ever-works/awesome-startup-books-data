markdown: >-
  ## Overview


  Business Model Generation is a handbook for visionaries, game changers, and
  challengers striving to defy outmoded business models and design tomorrow's
  enterprises.


  ## The Business Model Canvas


  The book introduces the Business Model Canvas, a one-page tool with nine
  building blocks:


  1. **Customer Segments**: Who are you serving?

  2. **Value Propositions**: What problems are you solving?

  3. **Channels**: How do you reach customers?

  4. **Customer Relationships**: How do you interact with customers?

  5. **Revenue Streams**: How do you make money?

  6. **Key Resources**: What assets do you need?

  7. **Key Activities**: What must you do?

  8. **Key Partnerships**: Who helps you?

  9. **Cost Structure**: What does it cost?


  ## Visual Approach


  The book uses visual thinking and design to help entrepreneurs map, discuss,
  design, and invent new business models.


  ## Applications


  - Designing new business models

  - Analyzing existing models

  - Pivoting strategies

  - Communicating business plans


  ## Impact


  The Business Model Canvas has become a standard tool used by millions of
  entrepreneurs and companies worldwide.


  ## Pricing


  Available for approximately $25-40.
