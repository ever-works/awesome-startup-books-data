markdown: >-
  ## Overview


  Scaling People was published by Stripe Press in Spring 2023 and was selected
  for Best Books of 2023 by Bloomberg and The Economist. The book provides
  actionable insights and tactical guidance for company building.


  ## About Claire Hughes Johnson


  Claire Hughes Johnson served as COO at Stripe from 2014 to 2021, helping the
  company grow from fewer than 200 employees to more than 7,000. She is
  currently a corporate officer and advisor at Stripe.


  Prior to Stripe, she spent 10 years at Google leading business teams,
  including:

  - Overseeing Gmail, Google Apps, and consumer operations

  - Vice President for AdWords

  - Google Offers

  - Google's self-driving car project


  ## What Makes This Book Different


  Unlike theoretical management books, Scaling People provides:

  - Over 100 pages of worksheets, templates, and example documents

  - Actual documents used at Stripe and Google

  - Tactical, immediately applicable advice

  - Honest discussion of what didn't work


  ## Core Framework


  The book is organized around three key areas:


  ### 1. Foundations

  - Crafting foundational documents (values, operating principles)

  - Building scalable operating systems

  - Creating lightweight but effective processes


  ### 2. People

  - Hiring at scale

  - Developing talent

  - Building teams

  - Managing managers

  - Providing effective feedback

  - Performance management systems


  ### 3. Company Building

  - Organizational design

  - Communication systems

  - Meeting structures

  - Decision-making frameworks

  - Scaling culture


  ## Key Concepts


  **Operating Principles**

  Hughes Johnson emphasizes creating explicit operating principles that guide
  how teams work together. She includes Stripe's actual operating principles as
  examples.


  **Clarity Documents**

  Detailed guidance on creating documents that provide clarity:

  - Team charters

  - Role descriptions

  - Decision-making frameworks

  - Communication protocols


  **The First 90 Days for Leaders**

  Drawing on Michael Watkins' work, Hughes Johnson developed Stripe's New Leader
  Experience (NLE) program:

  - Welcome emails

  - Pre-scheduled meetings

  - Leadership assessments

  - Six months of coaching access

  - 360° review at end of first 90 days


  **Feedback Mechanisms**

  Practical approaches to building feedback into daily operations:

  - Regular 1-on-1 structures

  - Performance review cycles

  - 360-degree feedback

  - Real-time feedback culture


  ## Templates and Worksheets Included


  The book provides actual templates for:

  - Career development frameworks

  - Performance review documents

  - Team charter templates

  - 1-on-1 meeting structures

  - Hiring scorecards

  - Onboarding checklists

  - Values and operating principles documents


  ## Hiring and Building Teams


  **Structured Interviews**

  - Creating interview loops

  - Training interviewers

  - Calibrating decision-making

  - Reducing bias


  **Team Composition**

  - Right-sizing teams

  - Balancing seniority levels

  - Building complementary skills

  - Managing team growth


  ## Managing at Scale


  **Layers of Management**

  How to think about adding management layers as companies grow:

  - When to promote individual contributors to managers

  - How to develop first-time managers

  - Building a manager of managers layer


  **Delegation**

  Practical frameworks for effective delegation:

  - What to delegate and when

  - How to delegate without losing quality

  - Building accountability without micromanaging


  ## Communication Systems


  **Meeting Structures**

  - Which meetings matter

  - How to run effective meetings

  - When to eliminate meetings

  - Scaling communication as teams grow


  **Written Communication**

  - Importance of writing things down

  - Creating documents that scale

  - Asynchronous communication


  ## Culture at Scale


  **Maintaining Culture While Growing**

  - How culture evolves (and should evolve)

  - What to preserve vs. what to change

  - Embedding values in systems

  - Hiring for culture add, not culture fit


  **Onboarding New Employees**

  - Creating consistent onboarding experiences

  - Scaling onboarding from 10 to 1,000 employees

  - Measuring onboarding effectiveness


  ## Organizational Design


  **Team Structure**

  - Functional vs. product-oriented structures

  - When to reorganize

  - How to execute reorganizations

  - Avoiding constant reorganization


  **Span of Control**

  - Ideal team sizes

  - Manager-to-employee ratios

  - When to split teams


  ## Performance Management


  **Setting Expectations**

  - Clear goal-setting

  - Aligning individual and company goals

  - Creating accountability


  **Evaluation Systems**

  - Designing fair performance reviews

  - Calibration processes

  - Compensation decisions

  - Managing low performers


  ## Real Stripe Examples


  Hughes Johnson shares actual Stripe documents and processes:

  - Stripe's operating principles

  - How Stripe runs performance reviews

  - Interview processes and scorecards

  - Team charter examples

  - Communication norms


  ## Lessons from Google


  Also includes insights from her Google experience:

  - What worked at Google scale

  - What needed adaptation for Stripe

  - Universal principles vs. company-specific solutions


  ## For Different Company Stages


  The book addresses scaling at different stages:

  - 10-50 employees

  - 50-200 employees

  - 200-1,000 employees

  - 1,000+ employees


  Each stage requires different approaches and systems.


  ## Common Scaling Mistakes


  **Too Much Process Too Soon**: Implementing enterprise processes when you're
  still small


  **Too Little Process Too Late**: Waiting too long to add necessary structure


  **Copying Other Companies**: Taking systems from Google/Facebook without
  adaptation


  **Scaling Culture Through Heroes**: Relying on individuals instead of systems


  ## Practical Application


  Each chapter ends with:

  - Key takeaways

  - Specific actions to implement

  - Templates to use

  - Common pitfalls to avoid


  ## Why This Book Matters for Founders


  Most startup books focus on finding product-market fit. Scaling People focuses
  on what comes after: building the company and team that can execute at scale.


  For founders going from 20 to 200 to 2,000 employees, this book provides a
  roadmap based on actual experience at two of the most successful tech
  companies.


  ## Critical Reception


  Praised for being immediately actionable. Unlike abstract management theory,
  every chapter provides concrete tools you can use tomorrow.


  McKinsey called it essential reading for anyone leading a growing company.


  ## Companion Resources


  Stripe Press website provides additional resources and updated templates.


  ## Pricing


  Available in hardcover, ebook, and audiobook formats through Stripe Press and
  major retailers.
