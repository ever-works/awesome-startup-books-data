markdown: >-
  ## Overview


  Wooden on Leadership details John Wooden's philosophy on coaching and leading
  teams to success, based on his experience winning multiple NCAA championships.


  ## Key Features


  - Pyramid of Success framework

  - Emphasis on character, effort, and team unity

  - Practical leadership lessons applicable to business


  ## Pricing


  Typically available for $15-25 in paperback.
