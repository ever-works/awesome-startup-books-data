name: "The Idea Factory: Bell Labs and the Great Age of American Innovation"
description: Jon Gertner chronicles the remarkable story of Bell Labs, the
  research and development wing of AT&T that became the world's greatest
  innovation lab. This New York Times bestseller reveals how a small group of
  brilliant minds created the transistor, laser, digital communications,
  cellular telephony, and countless other innovations that shaped modern life.
