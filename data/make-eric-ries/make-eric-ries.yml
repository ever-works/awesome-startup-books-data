markdown: >-
  ## Overview


  The Maker Movement Manifesto explores how the democratization of manufacturing
  tools is enabling a new generation of entrepreneurs.


  ## The Maker Movement Principles


  - Make

  - Share

  - Give

  - Learn

  - Tool up

  - Play

  - Participate

  - Support

  - Change


  ## Impact on Startups


  - Lower barriers to prototyping

  - Faster product development

  - Access to manufacturing

  - Community-driven innovation


  ## Pricing


  Available for approximately $18-28.
